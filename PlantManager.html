      photo:Plants._photoData||'',
      strainId:(document.getElementById('f_strainId')?document.getElementById('f_strainId').value:'')
    };
  },

  _openStrainPicker(){
    const strains=Store.strainsArray();
    if(!strains.length){Toast.show('No strains in library yet. Add one in the Strains tab.','info');return}
    const existing=document.querySelector('.strain-picker-wrap');
    if(existing){existing.remove();return}
    let h='<div style="margin-bottom:var(--space-md);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:var(--space-md);background:var(--bg-input)">';
    h+='<div style="font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);margin-bottom:var(--space-sm)">Pick a Strain</div>';
    h+='<input class="form-input" placeholder="Search strains…" oninput="Plants._filterStrainPicker(this.value)" style="margin-bottom:var(--space-sm)">';
    h+='<div class="strain-picker-grid" id="strainPickerGrid">';
    strains.forEach(s=>{
      h+='<div class="card strain-pick-card" onclick="Plants._selectStrain(\''+s.id+'\')">';
      h+='<div class="sp-name">'+U.esc(s.name)+'</div>';
      h+='<div class="sp-meta">'+(s.type?s.type:'')+''+(s.breeder?' &middot; '+U.esc(s.breeder):'')+'</div>';
      h+='</div>';
    });
    h+='</div></div>';
    const body=document.getElementById('modalBody');
    const wrap=document.createElement('div');
    wrap.className='strain-picker-wrap';
    wrap.innerHTML=h;
    body.insertBefore(wrap,body.firstChild);
  },

  _selectStrain(strainId){
    const s=Store.strainById(strainId);if(!s) return;
    document.getElementById('f_strainName').value=s.name;
    document.getElementById('f_strainType').value=s.type||'hybrid';
    document.getElementById('f_breeder').value=s.breeder||'';
    document.getElementById('f_strainId').value=strainId;
    const notesEl=document.getElementById('f_notes');
    if(notesEl&&s.growNotes&&!notesEl.value.trim()){
      notesEl.value='[Strain Notes] '+s.growNotes;
    }
    const wrap=document.querySelector('.strain-picker-wrap');
    if(wrap) wrap.remove();
    Toast.show('Strain "'+s.name+'" selected!','info');
  },

  _filterStrainPicker(query){
    const q=query.toLowerCase();
    const strains=Store.strainsArray().filter(s=>(s.name+' '+(s.breeder||'')+' '+(s.genetics||'')).toLowerCase().includes(q));
    let h='';
    strains.forEach(s=>{
      h+='<div class="card strain-pick-card" onclick="Plants._selectStrain(\''+s.id+'\')">';
      h+='<div class="sp-name">'+U.esc(s.name)+'</div>';
      h+='<div class="sp-meta">'+(s.type?s.type:'')+''+(s.breeder?' &middot; '+U.esc(s.breeder):'')+'</div>';
      h+='</div>';
    });
    document.getElementById('strainPickerGrid').innerHTML=h;
  },

  openAddModal(){
    Plants._photoData='';
    Modal.open('Add Mother Plant',Plants._buildForm(),
      '<button class="btn btn-ghost" onclick="Modal.close()">Cancel</button><button class="btn btn-primary" id="savePlant">Save</button>'
    );
    document.getElementById('savePlant').addEventListener('click',()=>{
      const data=Plants._readForm();if(!data) return;
      const id=U.id('m');
      data.id=id;data.archived=false;data.createdAt=Date.now();
      Store.set('mothers',id,data);
      Store.addActivity('plant_added','Added mother: '+data.strainName,id);
      Modal.close();Toast.show('Mother plant added!');
      Router.switchTo('plants');
    });
  },
  openEditModal(id){
    const m=Store.getById('mothers',id);if(!m) return;
    Plants._photoData=m.photo||'';
    Modal.open('Edit Mother Plant',Plants._buildForm(m),
      '<button class="btn btn-ghost" onclick="Modal.close()">Cancel</button><button class="btn btn-primary" id="savePlant">Save</button>'
    );
    document.getElementById('savePlant').addEventListener('click',()=>{
      const data=Plants._readForm();if(!data) return;
      const oldHealth=m.healthStatus;
      const updated=Object.assign({},m,data);
      if(Plants._photoData) updated.photo=Plants._photoData;
      else if(!Plants._photoData && m.photo) updated.photo=m.photo;
      Store.set('mothers',id,updated);
      if(oldHealth!==data.healthStatus) HealthCheck.autoLogOnEdit(id,oldHealth,data.healthStatus);
      Store.addActivity('plant_updated','Updated mother: '+data.strainName,id);
      Modal.close();Toast.show('Plant updated!');
    });
  },
  handleDelete(id){
    const m=Store.getById('mothers',id);if(!m) return;
    Modal.confirm('Archive Plant','Archive "'+U.esc(m.strainName)+'"? This will hide it from your active plants.',()=>{
      m.archived=true;
      Store.set('mothers',id,m);
      Store.addActivity('plant_archived','Archived mother: '+m.strainName,id);
      Toast.show('Plant archived.');
    });
  }
};
window.Plants=Plants;

/* ═══════════════════════════════════════════════
   CLONES

const Clones={
  _filterMother:'all',_filterStatus:'all',
  render(){
    const mothers=Store.mothersArray();
    let batches=Store.clonesArray();
    if(this._filterMother!=='all') batches=batches.filter(c=>c.motherId===this._filterMother);
    if(this._filterStatus!=='all') batches=batches.filter(c=>c.rootingStatus===this._filterStatus);

    const totalBatches=batches.length;
    const totalClones=batches.reduce((s,b)=>s+b.countTaken,0);
    const totalSuccess=batches.reduce((s,b)=>s+b.successCount,0);
    const avgRate=totalClones?Math.round(totalSuccess/totalClones*100):0;
    const activeRooting=batches.filter(c=>['cutting','callusing','rooting'].includes(c.rootingStatus)).reduce((s,b)=>s+(b.countTaken-b.successCount-b.failureCount),0);

    let h='<div class="toolbar">';
    h+='<button class="btn btn-primary" onclick="Clones.openAddModal()">+ Log Clone Batch</button>';
    h+='<select class="filter-select" onchange="Clones._filterMother=this.value;Clones.render()">';
    h+='<option value="all">All Mothers</option>';
    mothers.forEach(m=>{h+='<option value="'+m.id+'"'+(this._filterMother===m.id?' selected':'')+'>'+U.esc(m.strainName)+'</option>'});
    h+='</select>';
    h+='<select class="filter-select" onchange="Clones._filterStatus=this.value;Clones.render()">';
    h+='<option value="all">All Status</option>';
    ['cutting','callusing','rooting','rooted','transplanted','failed'].forEach(s=>{
      h+='<option value="'+s+'"'+(this._filterStatus===s?' selected':'')+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>'});
    h+='</select></div>';
    h+=_guideLinks([['Cloning Guide','cannabis-cloning-guide.html'],['Vertical Germination','Vertical_Germination_Guide.html'],['Seed Starting','seed-starting-guide.html']]);

    h+='<div class="stats-grid" style="margin-bottom:var(--space-xl)">';
    h+='<div class="card stat-card"><div class="stat-value">'+totalBatches+'</div><div class="stat-label">Batches</div></div>';
    h+='<div class="card stat-card gold"><div class="stat-value">'+totalClones+'</div><div class="stat-label">Total Clones</div></div>';
    h+='<div class="card stat-card green"><div class="stat-value">'+avgRate+'%</div><div class="stat-label">Avg Success</div></div>';
    h+='<div class="card stat-card orange"><div class="stat-value">'+activeRooting+'</div><div class="stat-label">Active Rooting</div></div>';
    h+='</div>';

    if(!batches.length){
      h+='<div class="empty-state"><div class="empty-icon">&#9986;</div><div class="empty-text">No clone batches yet. Log your first batch!</div></div>';
    }else{
      h+='<div class="clone-grid">';
      batches.forEach(c=>{
        const m=Store.getById('mothers',c.motherId);
        const pending=c.countTaken-c.successCount-c.failureCount;
        const rate=c.countTaken?Math.round(c.successCount/c.countTaken*100):0;
        const sPct=c.countTaken?(c.successCount/c.countTaken*100):0;
        const fPct=c.countTaken?(c.failureCount/c.countTaken*100):0;
        const pPct=100-sPct-fPct;
        h+='<div class="card clone-card"><div class="card-body">';
        h+='<div class="clone-main">';
        h+='<div class="clone-title">'+(m?U.esc(m.strainName):'Unknown Mother')+'</div>';
        h+='<div class="clone-subtitle">'+U.formatDate(c.cloneDate)+' &middot; '+U.esc(c.rootingMedium.replace('_',' '))+' &middot; <span class="badge-'+statusColor(c.rootingStatus)+'\" style="padding:.1rem .4rem;border-radius:3px;font-size:.6rem;font-weight:700">'+c.rootingStatus+'</span></div>';
        h+='<div class="progress-bar"><div class="seg-success" style="width:'+sPct+'%"></div><div class="seg-fail" style="width:'+fPct+'%"></div><div class="seg-pending" style="width:'+pPct+'%"></div></div>';
        h+='</div>';
        h+='<div class="clone-counts">';
        h+='<div class="clone-count success"><div class="count-val">'+c.successCount+'</div><div class="count-label">Success</div></div>';
        h+='<div class="clone-count fail"><div class="count-val">'+c.failureCount+'</div><div class="count-label">Failed</div></div>';
        h+='<div class="clone-count pending"><div class="count-val">'+pending+'</div><div class="count-label">Pending</div></div>';
        h+='<div class="clone-count"><div class="count-val">'+rate+'%</div><div class="count-label">Rate</div></div>';
        h+='</div>';
        h+='<div class="clone-actions">';
        h+='<button class="btn btn-ghost btn-sm" onclick="Clones.openEditModal(\''+c.id+'\')">Edit</button>';
        if(pending>0){
          h+='<button class="btn btn-ghost btn-sm" style="color:var(--leaf)" onclick="Clones.quickUpdate(\''+c.id+'\',\'success\')">+1 &#10003;</button>';
          h+='<button class="btn btn-ghost btn-sm" style="color:#e05c3a" onclick="Clones.quickUpdate(\''+c.id+'\',\'fail\')">+1 &#10007;</button>';
        }
        h+='</div></div></div>';
      });
      h+='</div>';
    }
    document.getElementById('panel-clones').innerHTML=h;
  },
  _buildForm(c,preselect){
    c=c||{};
    const mothers=Store.mothersArray();
    let h='<div class="form-group"><label class="form-label">Mother Plant *</label><select class="form-select" id="f_motherId">';
    h+='<option value="">Select mother...</option>';
    mothers.forEach(m=>{h+='<option value="'+m.id+'"'+((c.motherId===m.id||(preselect===m.id))?' selected':'')+'>'+U.esc(m.strainName)+'</option>'});
    h+='</select></div>';
    h+='<div class="form-row">';
    h+='<div class="form-group"><label class="form-label">Clone Date</label><input class="form-input" id="f_cloneDate" type="date" value="'+(c.cloneDate||U.today())+'"></div>';
    h+='<div class="form-group"><label class="form-label">Count Taken *</label><input class="form-input" id="f_countTaken" type="number" min="1" value="'+(c.countTaken||'')+'"></div>';
    h+='</div>';
    h+='<div class="form-group"><label class="form-label">Rooting Medium</label><select class="form-select" id="f_rootingMedium">';
    [['rockwool','Rockwool'],['rapid_rooter','Rapid Rooter'],['aerocloner','Aerocloner'],['soil','Soil'],['water','Water']].forEach(([v,l])=>{
      h+='<option value="'+v+'"'+(c.rootingMedium===v?' selected':'')+'>'+l+'</option>'});
    h+='</select></div>';
    h+='<div class="form-row">';
    h+='<div class="form-group"><label class="form-label">Success Count</label><input class="form-input" id="f_successCount" type="number" min="0" value="'+(c.successCount||0)+'"></div>';
    h+='<div class="form-group"><label class="form-label">Failure Count</label><input class="form-input" id="f_failureCount" type="number" min="0" value="'+(c.failureCount||0)+'"></div>';
    h+='</div>';
    h+='<div class="form-group"><label class="form-label">Rooting Status</label><select class="form-select" id="f_rootingStatus">';
    ['cutting','callusing','rooting','rooted','transplanted','failed'].forEach(s=>{
      h+='<option value="'+s+'"'+(c.rootingStatus===s?' selected':'')+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>'});
    h+='</select></div>';
    h+='<div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="f_cloneNotes">'+U.esc(c.notes||'')+'</textarea></div>';
    return h;
  },
  _readForm(){
    const mid=document.getElementById('f_motherId').value;
    const count=parseInt(document.getElementById('f_countTaken').value)||0;
    if(!mid){Toast.show('Select a mother plant.','error');return null}
    if(count<1){Toast.show('Count must be at least 1.','error');return null}
    const success=Math.min(parseInt(document.getElementById('f_successCount').value)||0,count);
    const failure=Math.min(parseInt(document.getElementById('f_failureCount').value)||0,count-success);
    return{
      motherId:mid,cloneDate:document.getElementById('f_cloneDate').value,
      countTaken:count,rootingMedium:document.getElementById('f_rootingMedium').value,
      successCount:success,failureCount:failure,
      rootingStatus:document.getElementById('f_rootingStatus').value,
      notes:document.getElementById('f_cloneNotes').value.trim()
    };
  },
  openAddModal(preselect){
    Modal.open('Log Clone Batch',Clones._buildForm(null,preselect),
      '<button class="btn btn-ghost" onclick="Modal.close()">Cancel</button><button class="btn btn-primary" id="saveClone">Save</button>'
    );
    document.getElementById('saveClone').addEventListener('click',()=>{
      const data=Clones._readForm();if(!data) return;
      const id=U.id('c');data.id=id;data.createdAt=Date.now();
      Store.set('clones',id,data);
      const m=Store.getById('mothers',data.motherId);
      Store.addActivity('clone_added','Took '+data.countTaken+' clones from '+(m?m.strainName:'unknown'),id);
      Modal.close();Toast.show('Clone batch logged!');
      Router.switchTo('clones');
    });
  },
  openEditModal(id){
    const c=Store.getById('clones',id);if(!c) return;
    Modal.open('Edit Clone Batch',Clones._buildForm(c),
      '<button class="btn btn-ghost" onclick="Modal.close()">Cancel</button><button class="btn btn-danger" id="deleteClone" style="margin-right:auto">Delete</button><button class="btn btn-primary" id="saveClone">Save</button>'
    );
    document.getElementById('saveClone').addEventListener('click',()=>{
      const data=Clones._readForm();if(!data) return;
      const updated=Object.assign({},c,data);
      Store.set('clones',id,updated);
      Store.addActivity('clone_updated','Updated clone batch',id);
      Modal.close();Toast.show('Clone batch updated!');
    });
    document.getElementById('deleteClone').addEventListener('click',()=>{
      Modal.close();
      setTimeout(()=>{
        Modal.confirm('Delete Clone Batch','Delete this clone batch? This cannot be undone.',()=>{
          Store.remove('clones',id);Toast.show('Clone batch deleted.');
        });
      },100);
    });
  },
  quickUpdate(id,type){
    const c=Store.getById('clones',id);if(!c) return;
    const pending=c.countTaken-c.successCount-c.failureCount;
    if(pending<=0) return;
    if(type==='success') c.successCount++;
    else c.failureCount++;
    Store.set('clones',id,c);
    Toast.show(type==='success'?'+1 Success':'+1 Failed',type==='success'?'success':'error');
  }
};
window.Clones=Clones;

function statusColor(s){
  const map={cutting:'stressed',callusing:'stressed',rooting:'healthy',rooted:'thriving',transplanted:'thriving',failed:'sick'};
  return map[s]||'healthy';
}

/* ═══════════════════════════════════════════════
   TASKS
   ═══════════════════════════════════════════════ */
const Tasks={
  _filterPlant:'all',_filterType:'all',
  render(){
    const mothers=Store.mothersArray();
    let tasks=Store.tasksArray();
    if(this._filterPlant!=='all') tasks=tasks.filter(t=>t.motherId===this._filterPlant);
    if(this._filterType!=='all') tasks=tasks.filter(t=>t.taskType===this._filterType);

    const today=U.today();
    const enabled=tasks.filter(t=>t.enabled);
    const overdue=enabled.filter(t=>t.nextDueDate<today);
    const dueToday=enabled.filter(t=>t.nextDueDate===today);
    const upcoming=enabled.filter(t=>t.nextDueDate>today);
    const completions=Object.values(Store.get('taskCompletions')).sort((a,b)=>b.completedAt-a.completedAt).slice(0,10);

    let h='<div class="toolbar">';
    h+='<button class="btn btn-primary" onclick="Tasks.openAddModal()">+ Add Task</button>';
    h+='<select class="filter-select" onchange="Tasks._filterPlant=this.value;Tasks.render()">';
    h+='<option value="all">All Plants</option><option value=""'+(this._filterPlant===''?' selected':'')+'>Global Tasks</option>';
    mothers.forEach(m=>{h+='<option value="'+m.id+'"'+(this._filterPlant===m.id?' selected':'')+'>'+U.esc(m.strainName)+'</option>'});
    h+='</select>';
    h+='<select class="filter-select" onchange="Tasks._filterType=this.value;Tasks.render()">';
    h+='<option value="all">All Types</option>';
    ['watering','feeding','pruning','ipm','repotting','cleaning','other'].forEach(t=>{
      h+='<option value="'+t+'"'+(this._filterType===t?' selected':'')+'>'+t.charAt(0).toUpperCase()+t.slice(1)+'</option>'});
    h+='</select></div>';

    if(!enabled.length && !completions.length){
      h+='<div class="empty-state"><div class="empty-icon">&#9745;</div><div class="empty-text">No tasks yet. Create one to stay on top of your plant care!</div></div>';
    }

    if(overdue.length) h+=Tasks._renderSection('Overdue','overdue',overdue,today);
    if(dueToday.length) h+=Tasks._renderSection('Due Today','today',dueToday,today);
    if(upcoming.length) h+=Tasks._renderSection('Upcoming','upcoming',upcoming,today);

    if(completions.length){
      h+='<div class="task-section completed">';
      h+='<div class="task-section-header">Recently Completed ('+completions.length+')</div>';
      h+='<div class="task-list">';
      completions.forEach(tc=>{
        const t=Store.getById('tasks',tc.taskId);
        h+='<div class="card task-card" style="opacity:.5"><div class="task-body">';
        h+='<div class="task-title">&#10003; '+(t?U.esc(t.description):'Deleted task')+'</div>';
        h+='<div class="task-sub"><span>'+U.relTime(tc.completedAt)+'</span></div>';
        h+='</div></div>';
      });
      h+='</div></div>';
    }

    document.getElementById('panel-tasks').innerHTML=h;
  },
  _renderSection(label,cls,items,today){
    let h='<div class="task-section '+cls+'">';
    h+='<div class="task-section-header">'+label+' ('+items.length+')</div>';
    h+='<div class="task-list">';
    items.forEach(t=>{
      const m=t.motherId?Store.getById('mothers',t.motherId):null;
      const days=U.daysBetween(U.parseDate(t.nextDueDate),new Date());
      let dueLabel='';
      if(t.nextDueDate===today) dueLabel='Today';
      else if(days>0) dueLabel=days+'d overdue';
      else if(days===-1) dueLabel='Tomorrow';
      else dueLabel='In '+Math.abs(days)+'d';
      const dueClass=days>0?'overdue':t.nextDueDate===today?'today':'';

      h+='<div class="card task-card" id="task-'+t.id+'">';
      h+='<div class="task-check"><label><input type="checkbox" onchange="Tasks.handleComplete(\''+t.id+'\')"><span class="checkmark">&#10003;</span></label></div>';
      h+='<div class="task-body"><div class="task-title">'+taskIcon(t.taskType)+' '+U.esc(t.description)+'</div>';
      h+='<div class="task-sub">'+(m?'<span>'+U.esc(m.strainName)+'</span>':'<span>Global</span>');
      h+='<span class="task-due '+dueClass+'">'+dueLabel+'</span>';
      if(t.scheduleType==='recurring') h+='<span class="task-recurring-badge">&#8635; '+t.intervalDays+'d</span>';
      h+='</div></div>';
      h+='<div class="clone-actions">';
      h+='<button class="btn btn-ghost btn-sm" onclick="Tasks.openEditModal(\''+t.id+'\')">Edit</button>';
      h+='</div>';
      h+='</div>';
    });
    h+='</div></div>';
    return h;
  },
  _buildForm(t,preselect){
    t=t||{};
    const mothers=Store.mothersArray();
    let h='<div class="form-group"><label class="form-label">Plant (optional)</label><select class="form-select" id="f_taskMother">';
    h+='<option value="">Global (all plants)</option>';
    mothers.forEach(m=>{h+='<option value="'+m.id+'"'+((t.motherId===m.id||(preselect===m.id))?' selected':'')+'>'+U.esc(m.strainName)+'</option>'});
    h+='</select></div>';
    h+='<div class="form-row">';
    h+='<div class="form-group"><label class="form-label">Task Type</label><select class="form-select" id="f_taskType">';
    ['watering','feeding','pruning','ipm','repotting','cleaning','other'].forEach(tp=>{
      h+='<option value="'+tp+'"'+(t.taskType===tp?' selected':'')+'>'+tp.charAt(0).toUpperCase()+tp.slice(1)+'</option>'});
    h+='</select></div>';
    h+='<div class="form-group"><label class="form-label">Due Date</label><input class="form-input" id="f_dueDate" type="date" value="'+(t.nextDueDate||U.today())+'"></div>';
    h+='</div>';
    h+='<div class="form-group"><label class="form-label">Description *</label><input class="form-input" id="f_taskDesc" value="'+U.esc(t.description||'')+'"></div>';

    h+='</div>';
    return h;
  },
  _readForm(){
    const desc=document.getElementById('f_taskDesc').value.trim();
    if(!desc){Toast.show('Description is required.','error');return null}
    return{
      motherId:document.getElementById('f_taskMother').value,

  openAddModal(preselect){

      Modal.close();
      setTimeout(()=>{
        Modal.confirm('Delete Task','Delete "'+U.esc(t.description)+'"? This cannot be undone.',()=>{
          Store.remove('tasks',id);Toast.show('Task deleted.');
        });
      },100);
    });
  },
  handleComplete(taskId){
    const t=Store.getById('tasks',taskId);if(!t) return;
    // Slide out animation
    const el=document.getElementById('task-'+taskId);
    if(el){el.classList.add('sliding-out');setTimeout(()=>_finish(),350)}
    else _finish();
    function _finish(){
      const tcId=U.id('tc');
      Store.set('taskCompletions',tcId,{id:tcId,taskId:taskId,motherId:t.motherId,completedAt:Date.now(),notes:''});
      if(t.scheduleType==='recurring'){
        const next=new Date();next.setDate(next.getDate()+t.intervalDays);
        t.nextDueDate=next.toISOString().split('T')[0];
        t.lastCompletedAt=Date.now();
        Store.set('tasks',taskId,t);
      }else{
        t.enabled=false;t.lastCompletedAt=Date.now();
        Store.set('tasks',taskId,t);
      }
      Store.addActivity('task_completed','Completed: '+t.description,taskId);
      Toast.show('Task completed!');
    }
  }
};

    if(!logs.length){
      h+='<div class="empty-state"><div class="empty-icon">&#127777;</div><div class="empty-text">No environment logs yet. Start tracking your grow conditions!</div></div>';
    }else{
      // Sparklines
      const last30=logs.slice(0,30).reverse();
      h+='<div class="section-title">Trends (last '+last30.length+' readings)</div>';

      h+='<div class="env-table-wrap"><table class="env-table"><thead><tr>';
      h+='<th>Date</th><th>Temp</th><th>RH</th><th>Light</th><th>pH</th><th>EC/PPM</th><th>Moon</th><th>Notes</th></tr></thead><tbody>';

      // Sparkline row
      h+='<tr style="background:var(--bg-card)">';
      h+='<td style="font-size:.65rem;color:var(--text-tertiary)">Trend</td>';
      ['temperature','humidity','lightHours','ph','ecPpm'].forEach(key=>{
        const vals=last30.map(l=>l[key]).filter(v=>v!=null);
        h+='<td>'+Environment._sparkline(vals)+'</td>';
      });
      h+='<td></td><td></td></tr>';

      logs.slice(0,30).forEach(e=>{
        const d=new Date(e.timestamp);
        h+='<tr>';
        h+='<td>'+d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</td>';
        h+='<td>'+(e.temperature!=null?e.temperature:'—')+'</td>';
        h+='<td>'+(e.humidity!=null?e.humidity+'%':'—')+'</td>';
        h+='<td>'+(e.lightHours!=null?e.lightHours+'h':'—')+'</td>';
        h+='<td>'+(e.ph!=null?e.ph:'—')+'</td>';
        h+='<td>'+(e.ecPpm!=null?e.ecPpm:'—')+'</td>';
        var mp=e.moonPhase||Moon.phase(new Date(e.timestamp)).name;var mi=Moon._PHASES.find(function(p){return p.name===mp});
        h+='<td style="font-size:.85rem" title="'+U.esc(mp)+'">'+(mi?mi.icon:'')+'</td>';
        h+='<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+U.esc(e.notes||'')+'</td>';
        h+='</tr>';
      });
      h+='</tbody></table></div>';
    }

    document.getElementById('panel-environment').innerHTML=h;
  },
  _sparkline(vals){
    if(vals.length<2) return '<span style="color:var(--text-tertiary);font-size:.7rem">—</span>';
    const w=80,ht=24,pad=2;
    const min=Math.min(...vals),max=Math.max(...vals);
    const range=max-min||1;
    const points=vals.map((v,i)=>{
      const x=pad+i*(w-2*pad)/(vals.length-1);
      const y=pad+(1-(v-min)/range)*(ht-2*pad);
      return x.toFixed(1)+','+y.toFixed(1);
    }).join(' ');
    return '<svg class="sparkline" width="'+w+'" height="'+ht+'" viewBox="0 0 '+w+' '+ht+'"><polyline fill="none" stroke="var(--cyan)" stroke-width="1.5" points="'+points+'"/></svg>';
  },
  openLogModal(preselect){
    const envs=Store.environmentsArray();
    const sel=preselect||(envs.length===1?envs[0].id:'');
    let h='<div class="form-group"><label class="form-label">Environment</label><select class="form-select" id="f_envTarget">';
    h+='<option value="">Global (no environment)</option>';
    envs.forEach(e=>{h+='<option value="'+e.id+'"'+(sel===e.id?' selected':'')+'>'+U.esc(e.name)+'</option>'});

    h+='<div class="form-row">';

    h+='</div>';
    if(Weather.isConfigured()){h+='<div style="margin-bottom:var(--space-md)"><button type="button" class="btn btn-outline btn-sm" onclick="Weather.fillEnvForm()">&#127780; Fetch Weather</button></div>'}
    h+='<div class="form-row">';
    h+='<div class="form-group"><label class="form-label">Light Hours</label><input class="form-input" id="f_lightHours" type="number" step="0.5"></div>';
    h+='<div class="form-group"><label class="form-label">pH</label><input class="form-input" id="f_ph" type="number" step="0.1"></div>';
    h+='</div>';
    h+='<div class="form-group"><label class="form-label">EC/PPM</label><input class="form-input" id="f_ecPpm" type="number" step="1"></div>';
    h+='<div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="f_envNotes"></textarea></div>';
    Modal.open('Log Environment Reading',h,
      '<button class="btn btn-ghost" onclick="Modal.close()">Cancel</button><button class="btn btn-primary" id="saveEnv">Save</button>'
    );
    document.getElementById('saveEnv').addEventListener('click',()=>{
      const id=U.id('e');
      const entry={
        id:id,
        environmentId:document.getElementById('f_envTarget').value,
        timestamp:Date.now(),
        temperature:document.getElementById('f_temp').value?parseFloat(document.getElementById('f_temp').value):null,
        humidity:document.getElementById('f_humidity').value?parseInt(document.getElementById('f_humidity').value):null,
        lightHours:document.getElementById('f_lightHours').value?parseFloat(document.getElementById('f_lightHours').value):null,
        ph:document.getElementById('f_ph').value?parseFloat(document.getElementById('f_ph').value):null,
        ecPpm:document.getElementById('f_ecPpm').value?parseInt(document.getElementById('f_ecPpm').value):null,
        notes:document.getElementById('f_envNotes').value.trim(),
        moonPhase:Moon.phase(new Date()).name
      };
      Store.set('envLogs',id,entry);
      Store.addActivity('env_logged','Logged environment reading',id);
      if(Store.setting('notificationsEnabled')) Notify.checkEnvReading(entry);
      Modal.close();Toast.show('Environment reading logged!');
      Router.switchTo('environment');
    });
  }
};

  /* ── Nutrient Catalog Picker ── */
  _openCatalog(){
    const existing=document.querySelector('.nutrient-picker-wrap');
    if(existing){existing.remove();return}
    let h='<div style="margin-bottom:var(--space-md);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:var(--space-md);background:var(--bg-input)">';
    h+='<div style="font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);margin-bottom:var(--space-sm)">Nutrient Catalog</div>';
    h+='<div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-sm);flex-wrap:wrap">';
    h+='<input class="form-input" placeholder="Search products\u2026" oninput="Feeding._filterCatalog()" id="nutrientCatalogSearch" style="flex:1;min-width:140px">';
    const brands=[...new Set(this._catalog.map(c=>c.brand))].sort();
    h+='<select class="form-select" id="nutrientBrandFilter" onchange="Feeding._catalogBrand=this.value;Feeding._filterCatalog()" style="min-width:120px">';
    h+='<option value="all">All Brands</option>';
    brands.forEach(b=>{const ct=this._catalog.filter(c=>c.brand===b).length;h+='<option value="'+b+'">'+U.esc(b)+' ('+ct+')</option>'});
    h+='</select></div>';
    h+='<div id="nutrientCatalogGrid" style="max-height:260px;overflow-y:auto">'+this._buildCatalogGrid()+'</div>';
    h+='</div>';
    const wrap=document.createElement('div');
    wrap.className='nutrient-picker-wrap';
    wrap.innerHTML=h;
    const btn=document.querySelector('.nutrient-picker-wrap')
      ||document.querySelector('[onclick="Feeding._openCatalog()"]');
    if(btn) btn.parentElement.after(wrap);
  },

  _buildCatalogGrid(query,brand){
    query=(query||'').toLowerCase();
    brand=brand||this._catalogBrand||'all';
    let items=this._catalog.map((c,idx)=>({...c,_idx:idx}));
    if(brand!=='all') items=items.filter(c=>c.brand===brand);
    if(query) items=items.filter(c=>(c.name+' '+c.brand+' '+(c.line||'')+' '+c.type).toLowerCase().includes(query));
    if(!items.length) return '<div style="padding:var(--space-md);color:var(--text-tertiary);font-size:.8rem;text-align:center">No products found</div>';
    let h='<div style="display:grid;grid-template-columns:1fr;gap:var(--space-xs)">';
    items.forEach(c=>{
      const typeColors={base:'var(--cyan)',grow:'var(--leaf)',bloom:'var(--orange)','cal-mag':'var(--gold)',supplement:'var(--text-secondary)',additive:'var(--text-tertiary)',pH:'#9b6bb5'};
      const color=typeColors[c.type]||'var(--text-secondary)';
      h+='<div class="card" style="padding:var(--space-sm) var(--space-md);cursor:pointer" onclick="Feeding._selectProduct('+c._idx+')">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--space-sm)">';
      h+='<div style="min-width:0">';
      h+='<div style="font-weight:700;font-size:.85rem">'+U.esc(c.name)+'</div>';
      h+='<div style="font-size:.68rem;color:var(--text-tertiary)">'+U.esc(c.brand)+(c.line?' \u00b7 '+U.esc(c.line):'')+'</div>';
      h+='<div style="display:flex;gap:var(--space-xs);flex-wrap:wrap;margin-top:2px">';
      h+='<span style="font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:.1rem .4rem;border-radius:3px;background:rgba(255,255,255,.06);color:'+color+'">'+c.type+'</span>';
      if(c.defaultAmount) h+='<span style="font-size:.65rem;color:var(--text-secondary)">'+c.defaultAmount+' '+c.defaultUnit+'</span>';
      h+='</div></div>';
      h+='<div style="flex-shrink:0;font-size:.7rem;color:var(--cyan);font-weight:600">Select</div>';
      h+='</div></div>';
    });
    h+='</div>';
    return h;
  },

  _filterCatalog(){
    const q=document.getElementById('nutrientCatalogSearch')?document.getElementById('nutrientCatalogSearch').value:'';
    const grid=document.getElementById('nutrientCatalogGrid');
    if(grid) grid.innerHTML=this._buildCatalogGrid(q);
  },

  _selectProduct(idx){
    const c=this._catalog[idx];if(!c) return;
    const nameEl=document.getElementById('f_nutrientName');
    const amtEl=document.getElementById('f_nutrientAmount');
    const unitEl=document.getElementById('f_nutrientUnit');
    if(nameEl) nameEl.value=c.brand!=='Generic'?c.brand+' '+c.name:c.name;
    if(amtEl&&c.defaultAmount) amtEl.value=c.defaultAmount;
    if(unitEl&&c.defaultUnit) unitEl.value=c.defaultUnit;
    const wrap=document.querySelector('.nutrient-picker-wrap');
    if(wrap) wrap.remove();
    Toast.show('Product selected: '+c.name,'info');
  },

  /* ── Quick Water Log ── */
  openQuickWater(){
    const mothers=Store.mothersArray();

  saveQuickWater(){

};

  _filter:'all',_photoData:'',

  openDetail(id){

  },
  handleDelete(id){
    Modal.confirm('Delete Photo','Permanently delete this photo?',()=>{
      Store.remove('photoJournal',id);
      Store.addActivity('photo_deleted','Deleted journal photo',id);
      Toast.show('Photo deleted.');
    });
  },
  _onPhoto(input){
    if(!input.files[0]) return;
    U.resizeImage(input.files[0],400,0.6,function(dataUrl){

      const preview=document.getElementById('journalPreview');
      preview.innerHTML='<img src="'+dataUrl+'" style="width:100%;height:100%;object-fit:cover">';
    });
  },
  openAddModal(preselect){
    Journal._photoData='';
    const mothers=Store.mothersArray();
    let h='<div class="form-group"><label class="form-label">Plant *</label><select class="form-select" id="f_journalMother">';
    h+='<option value="">Select plant</option>';
    mothers.forEach(m=>{h+='<option value="'+m.id+'"'+(preselect===m.id?' selected':'')+'>'+U.esc(m.strainName)+'</option>'});

    h+='<div class="form-group"><label class="form-label">Photo *</label>';

    h+='<div class="photo-placeholder">Click to upload photo</div></div>';
    h+='<input type="file" id="f_journalPhoto" accept="image/*" class="sr-only" onchange="Journal._onPhoto(this)"></div>';
    h+='<div class="form-group"><label class="form-label">Growth Stage</label><select class="form-select" id="f_journalStage">';
    ['','seedling','vegetative','flowering','harvest','curing'].forEach(s=>{
      h+='<option value="'+s+'">'+(s?s.charAt(0).toUpperCase()+s.slice(1):'Select stage')+'</option>'
    });
    h+='</select></div>';
    h+='<div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="f_journalNotes"></textarea></div>';
    Modal.open('Add Journal Photo',h,'<button class="btn btn-ghost" onclick="Modal.close()">Cancel</button><button class="btn btn-primary" id="saveJournal">Save</button>');
    document.getElementById('saveJournal').addEventListener('click',()=>{
      const motherId=document.getElementById('f_journalMother').value;
      if(!motherId){Toast.show('Please select a plant.','error');return}
      if(!Journal._photoData){Toast.show('Please upload a photo.','error');return}
      const id=U.id('ph');

        photo:Journal._photoData,
        growthStage:document.getElementById('f_journalStage').value,
        notes:document.getElementById('f_journalNotes').value.trim()
      };
      Store.set('photoJournal',id,entry);
      const m=Store.getById('mothers',motherId);
      Store.addActivity('photo_added','Added journal photo: '+(m?m.strainName:''),id);
      Modal.close();Toast.show('Photo added to journal!');
      Router.switchTo('journal');
    });
  }
};
window.Journal=Journal;

  render(){

  /* ── IPM Product Catalog Picker ── */
  _openIpmCatalog(){

    const cats=[...new Set(this._ipmCatalog.map(c=>c.category))].sort();
    h+='<select class="form-select" id="ipmCatFilter" onchange="IPM._catalogCat=this.value;IPM._filterIpmCatalog()" style="min-width:120px">';

    cats.forEach(c=>{const ct=this._ipmCatalog.filter(p=>p.category===c).length;h+='<option value="'+c+'">'+c.charAt(0).toUpperCase()+c.slice(1)+' ('+ct+')</option>'});

    h+='<div id="ipmCatalogGrid" style="max-height:260px;overflow-y:auto">'+this._buildIpmCatalogGrid()+'</div>';
    h+='</div>';
    const wrap=document.createElement('div');

    wrap.innerHTML=h;
    const btn=document.querySelector('[onclick="IPM._openIpmCatalog()"]');
    if(btn) btn.parentElement.after(wrap);
  },

  _buildIpmCatalogGrid(query,cat){
    query=(query||'').toLowerCase();
    cat=cat||this._catalogCat||'all';
    let items=this._ipmCatalog.map((c,idx)=>({...c,_idx:idx}));
    if(cat!=='all') items=items.filter(c=>c.category===cat);
    if(query) items=items.filter(c=>(c.name+' '+c.brand+' '+c.targets+' '+c.category).toLowerCase().includes(query));
    if(!items.length) return '<div style="padding:var(--space-md);color:var(--text-tertiary);font-size:.8rem;text-align:center">No treatments found</div>';
    let h='<div style="display:grid;grid-template-columns:1fr;gap:var(--space-xs)">';
    items.forEach(c=>{
      const catColors={insecticide:'var(--orange)',miticide:'#e05c3a',fungicide:'var(--gold)',biological:'var(--leaf)',organic:'var(--cyan)',knf:'#a78bfa',environmental:'var(--text-secondary)'};
      const color=catColors[c.category]||'var(--text-secondary)';
      h+='<div class="card" style="padding:var(--space-sm) var(--space-md);cursor:pointer" onclick="IPM._selectIpmProduct('+c._idx+')">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--space-sm)">';
      h+='<div style="min-width:0">';
      h+='<div style="font-weight:700;font-size:.85rem">'+U.esc(c.name)+'</div>';
      if(c.brand!=='Generic'&&c.brand!=='Environmental'&&c.brand!=='Biocontrol') h+='<div style="font-size:.68rem;color:var(--text-tertiary)">'+U.esc(c.brand)+'</div>';
      h+='<div style="display:flex;gap:var(--space-xs);flex-wrap:wrap;margin-top:2px">';
      h+='<span style="font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:.1rem .4rem;border-radius:3px;background:rgba(255,255,255,.06);color:'+color+'">'+c.category+'</span>';
      h+='</div>';
      h+='<div style="font-size:.65rem;color:var(--text-secondary);margin-top:2px">Targets: '+U.esc(c.targets)+'</div>';
      h+='</div>';
      h+='<div style="flex-shrink:0;font-size:.7rem;color:var(--cyan);font-weight:600">+ Add</div>';
      h+='</div></div>';
    });
    h+='</div>';
    return h;
  },

  _filterIpmCatalog(){
    const q=document.getElementById('ipmCatalogSearch')?document.getElementById('ipmCatalogSearch').value:'';
    const grid=document.getElementById('ipmCatalogGrid');
    if(grid) grid.innerHTML=this._buildIpmCatalogGrid(q);
  },

  _selectIpmProduct(idx){
    const c=this._ipmCatalog[idx];if(!c) return;
    const el=document.getElementById('f_treatment');
    if(!el) return;
    const product=c.brand!=='Generic'&&c.brand!=='Environmental'&&c.brand!=='Biocontrol'?c.name+' ('+c.brand+')':c.name;
    if(el.value.trim()){
      el.value=el.value.trim()+' + '+product;
    }else{
      el.value=product;
    }
    Toast.show('Added: '+c.name,'info');
  }
};

/* ═══════════════════════════════════════════════
   CHART HELPERS (Pure SVG)
   ═══════════════════════════════════════════════ */
const Chart={
  _colors:['#00c8c0','#f0b429','#4a9e52','#e8721a','#9b6bb5','#e05c3a','#2d6e35','#00968f'],
  _c(i){return this._colors[i%this._colors.length]},
  _textCol:'rgba(240,234,216,.55)',
  _gridCol:'rgba(255,255,255,.06)',

  line(datasets,opts){
    const W=opts.width||560,H=opts.height||200,pad={t:10,r:15,b:30,l:42};
    const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
    if(!datasets.length||!datasets.some(d=>d.values.length)) return '<div class="chart-no-data">No data available</div>';
    let allY=[];datasets.forEach(d=>d.values.forEach(v=>allY.push(v.y)));
    let yMin=opts.yMin!==undefined?opts.yMin:Math.min(...allY);
    let yMax=opts.yMax!==undefined?opts.yMax:Math.max(...allY);
    if(yMin===yMax){yMin-=1;yMax+=1}
    const yRange=yMax-yMin;
    let allX=[];datasets.forEach(d=>d.values.forEach(v=>allX.push(v.x)));
    let xMin=Math.min(...allX),xMax=Math.max(...allX);
    if(xMin===xMax){xMin-=1;xMax+=1}
    const xRange=xMax-xMin;
    const sx=x=>pad.l+((x-xMin)/xRange)*cw;
    const sy=y=>pad.t+ch-((y-yMin)/yRange)*ch;
    let s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
    for(let i=0;i<=4;i++){
      const yv=yMin+(yRange/4)*i;const yy=sy(yv);
      s+='<line x1="'+pad.l+'" y1="'+yy+'" x2="'+(W-pad.r)+'" y2="'+yy+'" stroke="'+this._gridCol+'" stroke-width="1"/>';
      s+='<text x="'+(pad.l-4)+'" y="'+(yy+3)+'" fill="'+this._textCol+'" font-size="9" text-anchor="end">'+(yv%1===0?yv:yv.toFixed(1))+'</text>';
    }
    if(opts.xLabels&&opts.xLabels.length){
      const step=Math.max(1,Math.floor(opts.xLabels.length/6));
      opts.xLabels.forEach((lbl,i)=>{
        if(i%step===0){
          const xp=pad.l+(i/(opts.xLabels.length-1||1))*cw;
          s+='<text x="'+xp+'" y="'+(H-4)+'" fill="'+this._textCol+'" font-size="8" text-anchor="middle">'+lbl+'</text>';
        }
      });
    }
    datasets.forEach((d,di)=>{
      const col=d.color||this._c(di);
      if(d.values.length<2){
        if(d.values.length===1) s+='<circle cx="'+sx(d.values[0].x)+'" cy="'+sy(d.values[0].y)+'" r="3" fill="'+col+'"/>';
        return;
      }
      let pts=d.values.map(v=>sx(v.x)+','+sy(v.y)).join(' ');
      s+='<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
      if(opts.showDots!==false) d.values.forEach(v=>{
        s+='<circle cx="'+sx(v.x)+'" cy="'+sy(v.y)+'" r="2.5" fill="'+col+'"/>';
      });
    });
    s+='</svg>';
    return s;
  },

  bar(data,opts){
    const W=opts.width||560,H=opts.height||200,pad={t:10,r:15,b:50,l:42};
    const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
    if(!data.length) return '<div class="chart-no-data">No data available</div>';
    const vals=data.map(d=>Array.isArray(d.segments)?d.segments.reduce((s,sg)=>s+sg.value,0):d.value);
    const yMax=Math.max(...vals,1);
    const barW=Math.min(40,cw/data.length*0.7);
    const gap=(cw-barW*data.length)/(data.length+1);
    const sy=v=>pad.t+ch-(v/yMax)*ch;
    let s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
    for(let i=0;i<=4;i++){
      const yv=(yMax/4)*i;const yy=sy(yv);
      s+='<line x1="'+pad.l+'" y1="'+yy+'" x2="'+(W-pad.r)+'" y2="'+yy+'" stroke="'+this._gridCol+'" stroke-width="1"/>';
      s+='<text x="'+(pad.l-4)+'" y="'+(yy+3)+'" fill="'+this._textCol+'" font-size="9" text-anchor="end">'+(yv%1===0?yv:yv.toFixed(1))+'</text>';
    }
    data.forEach((d,i)=>{
      const x=pad.l+gap+(barW+gap)*i;
      if(Array.isArray(d.segments)){
        let cumY=0;
        d.segments.forEach(sg=>{
          const bh=(sg.value/yMax)*ch;
          s+='<rect x="'+x+'" y="'+sy(cumY+sg.value)+'" width="'+barW+'" height="'+Math.max(bh,0)+'" fill="'+(sg.color||this._c(i))+'" rx="2"/>';
          cumY+=sg.value;
        });
      }else{
        const bh=(d.value/yMax)*ch;
        s+='<rect x="'+x+'" y="'+sy(d.value)+'" width="'+barW+'" height="'+Math.max(bh,0)+'" fill="'+(d.color||this._c(i))+'" rx="2"/>';
      }
      s+='<text x="'+(x+barW/2)+'" y="'+(H-pad.b+12)+'" fill="'+this._textCol+'" font-size="8" text-anchor="middle" transform="rotate(-35,'+(x+barW/2)+','+(H-pad.b+12)+')">'+U.esc(d.label.length>12?d.label.slice(0,12)+'…':d.label)+'</text>';
    });
    s+='</svg>';
    return s;
  },

  donut(data,opts){
    const size=opts.size||200,cx=size/2,cy=size/2;
    const outer=size/2-5,inner=opts.innerRadius||size*0.3;
    const total=data.reduce((s,d)=>s+d.value,0);
    if(!total) return '<div class="chart-no-data">No data available</div>';
    let s='<svg viewBox="0 0 '+size+' '+size+'" xmlns="http://www.w3.org/2000/svg">';
    let angle=-Math.PI/2;
    data.forEach((d,i)=>{
      if(d.value<=0) return;
      const sweep=(d.value/total)*Math.PI*2;
      const a1=angle,a2=angle+sweep;
      const large=sweep>Math.PI?1:0;
      const x1o=cx+outer*Math.cos(a1),y1o=cy+outer*Math.sin(a1);
      const x2o=cx+outer*Math.cos(a2),y2o=cy+outer*Math.sin(a2);
      const x2i=cx+inner*Math.cos(a2),y2i=cy+inner*Math.sin(a2);
      const x1i=cx+inner*Math.cos(a1),y1i=cy+inner*Math.sin(a1);
      const col=d.color||this._c(i);
      s+='<path d="M'+x1o+','+y1o+' A'+outer+','+outer+' 0 '+large+' 1 '+x2o+','+y2o+' L'+x2i+','+y2i+' A'+inner+','+inner+' 0 '+large+' 0 '+x1i+','+y1i+' Z" fill="'+col+'"/>';
      angle=a2;
    });
    if(opts.centerText){
      s+='<text x="'+cx+'" y="'+(cy+6)+'" fill="'+this._textCol+'" font-size="20" font-weight="700" text-anchor="middle" dominant-baseline="auto">'+opts.centerText+'</text>';
    }else{
      s+='<text x="'+cx+'" y="'+(cy-4)+'" fill="'+this._textCol+'" font-size="22" font-weight="700" text-anchor="middle" dominant-baseline="auto">'+total+'</text>';
      s+='<text x="'+cx+'" y="'+(cy+14)+'" fill="'+this._textCol+'" font-size="9" text-anchor="middle">total</text>';
    }
    s+='</svg>';
    return s;
  },

  heatmap(weeks,opts){
    const cellSize=opts.cellSize||14,gap=2;
    const numWeeks=weeks.length;
    if(!numWeeks) return '<div class="chart-no-data">No activity data</div>';
    const W=numWeeks*(cellSize+gap)+30,H=7*(cellSize+gap)+20;
    let maxV=0;weeks.forEach(w=>w.forEach(v=>{if(v>maxV) maxV=v}));
    if(!maxV) maxV=1;
    const dayLabels=['','Mon','','Wed','','Fri',''];
    let s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
    dayLabels.forEach((lbl,d)=>{
      if(lbl) s+='<text x="12" y="'+(d*(cellSize+gap)+cellSize/2+10)+'" fill="'+this._textCol+'" font-size="8" text-anchor="end" dominant-baseline="central">'+lbl+'</text>';
    });
    weeks.forEach((w,wi)=>{
      w.forEach((v,d)=>{
        const x=20+wi*(cellSize+gap),y=d*(cellSize+gap);
        const alpha=v>0?0.2+(v/maxV)*0.8:0.04;
        s+='<rect x="'+x+'" y="'+y+'" width="'+cellSize+'" height="'+cellSize+'" rx="2" fill="rgba(0,200,192,'+alpha.toFixed(2)+')"/>';
      });
    });
    s+='</svg>';
    return s;
  },

  tree(forest,opts){
    opts=opts||{};
    const nW=opts.nodeWidth||160,nH=opts.nodeHeight||56,hGap=opts.hGap||40,vGap=opts.vGap||70;
    if(!forest.length) return '<div class="chart-no-data">No lineage data yet. Add mother plants with Source=Clone and set a Parent Mother to build a tree.</div>';
    const hCol={thriving:'#2d6e35',healthy:'#4a9e52',stressed:'#f0b429',sick:'#e05c3a',quarantine:'#9b6bb5'};
    let nextX=0;
    function layout(node,depth){
      node._y=depth*(nH+vGap);
      if(!node.children.length){node._x=nextX;nextX+=nW+hGap}
      else{node.children.forEach(function(ch){layout(ch,depth+1)});node._x=(node.children[0]._x+node.children[node.children.length-1]._x)/2}
    }
    forest.forEach(function(r){layout(r,0)});
    let maxX=0,maxY=0;
    function bounds(n){if(n._x+nW>maxX) maxX=n._x+nW;if(n._y+nH>maxY) maxY=n._y+nH;n.children.forEach(bounds)}
    forest.forEach(bounds);
    const pad=20,svgW=maxX+pad*2,svgH=maxY+nH+pad*2;
    let s='<svg viewBox="0 0 '+svgW+' '+svgH+'" xmlns="http://www.w3.org/2000/svg" style="min-width:'+svgW+'px">';
    const self=this;
    function connectors(node){
      const px=pad+node._x+nW/2,pb=pad+node._y+nH;
      node.children.forEach(function(ch){
        const cx=pad+ch._x+nW/2,ct=pad+ch._y;
        const midY=(pb+ct)/2;
        s+='<path d="M'+px+' '+pb+' V'+midY+' H'+cx+' V'+ct+'" fill="none" stroke="'+self._colors[0]+'" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>';
        const clones=Store.clonesForMother(node.mother.id);
        if(clones.length){
          const total=clones.reduce(function(a,b){return a+b.countTaken},0);
          const bx=(px+cx)/2;
          s+='<rect x="'+(bx-20)+'" y="'+(midY-9)+'" width="40" height="18" rx="9" fill="rgba(0,200,192,0.12)" stroke="'+self._colors[0]+'" stroke-width="0.5"/>';
          s+='<text x="'+bx+'" y="'+(midY+4)+'" fill="'+self._colors[0]+'" font-size="8" font-weight="600" text-anchor="middle">&#9986; '+total+'</text>';
        }
        connectors(ch);
      });
    }
    function renderNode(node){
      const x=pad+node._x,y=pad+node._y,m=node.mother;
      const hc=hCol[m.healthStatus]||'#4a9e52';
      const isArchived=m.archived;
      s+='<g class="tree-node" onclick="Lineage._onNodeClick(\''+m.id+'\')"'+(isArchived?' opacity="0.45"':'')+'>';
      s+='<rect x="'+x+'" y="'+y+'" width="'+nW+'" height="'+nH+'" rx="6" fill="rgba(27,58,30,.18)" stroke="'+hc+'" stroke-width="1.5"/>';
      s+='<rect x="'+x+'" y="'+y+'" width="'+nW+'" height="4" rx="2" fill="'+hc+'"/>';
      const dn=m.strainName.length>18?m.strainName.slice(0,16)+'…':m.strainName;
      s+='<text x="'+(x+8)+'" y="'+(y+20)+'" fill="'+self._textCol+'" font-size="11" font-weight="700">'+U.esc(dn)+'</text>';
      s+='<text x="'+(x+8)+'" y="'+(y+34)+'" fill="'+hc+'" font-size="8" font-weight="600">'+(m.healthStatus||'healthy').toUpperCase()+'</text>';
      s+='<text x="'+(x+nW-8)+'" y="'+(y+20)+'" fill="'+self._textCol+'" font-size="7" font-weight="700" text-anchor="end">Gen '+node.generation+'</text>';
      const srcIcon=(!m.parentMotherId)?'&#127793;':'&#9986;';
      s+='<text x="'+(x+nW-8)+'" y="'+(y+34)+'" fill="'+self._textCol+'" font-size="9" text-anchor="end">'+srcIcon+'</text>';
      const cc=Store.clonesForMother(m.id).reduce(function(a,b){return a+b.countTaken},0);
      if(cc) s+='<text x="'+(x+nW-8)+'" y="'+(y+nH-6)+'" fill="'+self._textCol+'" font-size="7" text-anchor="end">'+cc+' clones</text>';
      if(isArchived) s+='<text x="'+(x+8)+'" y="'+(y+nH-6)+'" fill="'+self._textCol+'" font-size="7" opacity="0.7">ARCHIVED</text>';
      s+='</g>';
      node.children.forEach(renderNode);
    }
    forest.forEach(connectors);
    forest.forEach(renderNode);
    s+='</svg>';
    return s;
  }
};

  openEditModal(id){
    const item=Store.getById('harvests',id);if(!item) return;
    Harvest._photoData=item.photo||'';
    Modal.open('Edit Harvest',Harvest._buildForm(item),
      '<button class="btn btn-ghost" onclick="Modal.close()">Cancel</button><button class="btn btn-primary" id="saveHarvest">Save</button>'
    );
    document.getElementById('saveHarvest').addEventListener('click',()=>{
      const data=Harvest._readForm();
      if(!data.motherId){Toast.show('Please select a plant','error');return;}
      if(!data.photo&&item.photo&&Harvest._photoData==='') data.photo='';
      else if(!data.photo&&item.photo) data.photo=item.photo;
      const updated=Object.assign({},item,data,{updatedAt:Date.now()});
      Store.set('harvests',id,updated);
      const m=Store.getById('mothers',updated.motherId);
      Store.addActivity('harvest_updated','Updated harvest: '+(m?m.strainName:'Unknown'),id);
      Modal.close();Toast.show('Harvest updated!');
    });
  },
  handleDelete(id){
    if(!confirm('Delete this harvest record? This cannot be undone.')) return;
    const item=Store.getById('harvests',id);
    Store.remove('harvests',id);
    const m=item&&item.motherId?Store.getById('mothers',item.motherId):null;
    Store.addActivity('harvest_deleted','Deleted harvest: '+(m?m.strainName:'Unknown'),id);
    Toast.show('Harvest deleted');
  }
};
window.Harvest=Harvest;

  _onSearch:U.debounce(function(v){Strains._search=v;Strains.render()},300),
  _onFilter(v){this._filterType=v;this.render()},

  /* ── Catalog browser ── */
  _catalogBreeder:'all',
  openCatalog(){
    Strains._catalogBreeder='all';
    const breeders=[...new Set(Strains._catalog.map(c=>c.breeder))].sort();
    let h='<div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-md);flex-wrap:wrap">';
    h+='<input class="form-input" style="flex:1;min-width:180px" placeholder="Search by name or genetics…" oninput="Strains._filterCatalog()"  id="catalogSearch">';
    h+='<select class="form-select" style="min-width:160px" onchange="Strains._catalogBreeder=this.value;Strains._filterCatalog()" id="catalogBreederFilter">';
    h+='<option value="all">All Breeders ('+Strains._catalog.length+')</option>';
    breeders.forEach(b=>{const n=Strains._catalog.filter(c=>c.breeder===b).length;h+='<option value="'+U.esc(b)+'">'+U.esc(b)+' ('+n+')</option>'});
    h+='</select></div>';
    h+='<div id="catalogGrid" style="max-height:55vh;overflow-y:auto">';
    h+=Strains._buildCatalogGrid('','all');
    h+='</div>';
    h+='<div style="margin-top:var(--space-sm);font-size:.7rem;color:var(--text-tertiary)">Sources: <a href="https://deepgreengenetics.com/" target="_blank" rel="noopener" style="color:var(--cyan)">Deep Green Genetics</a> &bull; <a href="https://www.hawaiianbudline.com/store" target="_blank" rel="noopener" style="color:var(--cyan)">Hawaiian Budline</a> &bull; <a href="https://clonefreak.com/" target="_blank" rel="noopener" style="color:var(--cyan)">CloneFreak</a></div>';
    Modal.open('Strain Catalog',h,'<button class="btn btn-ghost" onclick="Modal.close()">Close</button>');
  },

  _buildCatalogGrid(query,breeder){
    const q=(query||'').toLowerCase();
    const bf=breeder||Strains._catalogBreeder||'all';
    const existing=Store.strainsArray().map(s=>s.name.toLowerCase());
    let items=Strains._catalog.map((c,idx)=>({...c,_idx:idx}));
    if(bf!=='all') items=items.filter(c=>c.breeder===bf);
    if(q) items=items.filter(c=>(c.name+' '+(c.breeder||'')+' '+(c.source||'')+' '+(c.genetics||'')+' '+c.type).toLowerCase().includes(q));
    let h='';
    items.forEach(c=>{
      const added=existing.includes(c.name.toLowerCase());
      h+='<div class="card" style="padding:var(--space-md);margin-bottom:var(--space-sm);'+(added?'opacity:.5':'')+'">';
      h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-sm)">';
      h+='<div><div style="font-weight:700;font-size:.9rem">'+U.esc(c.name)+'</div>';
      h+='<div style="font-size:.68rem;color:var(--text-secondary);margin-bottom:2px">'+U.esc(c.breeder)+(c.source?' &middot; <span style="color:var(--text-tertiary)">by '+U.esc(c.source)+'</span>':'')+'</div>';
      h+='<div style="display:flex;flex-wrap:wrap;gap:var(--space-xs);margin:var(--space-xs) 0">';
      h+='<span class="type-badge type-'+c.type+'">'+c.type+'</span>';
      if(c.clone) h+='<span style="font-size:.6rem;padding:.15rem .4rem;border-radius:3px;background:rgba(0,200,192,.12);color:var(--cyan);font-weight:700;letter-spacing:.05em">CLONE</span>';
      if(c.fem) h+='<span style="font-size:.6rem;padding:.15rem .4rem;border-radius:3px;background:rgba(155,107,181,.15);color:#b48cce;font-weight:700;letter-spacing:.05em">FEM</span>';
      if(c.floweringTime) h+='<span style="font-size:.65rem;color:var(--text-secondary)">&#9202; '+U.esc(c.floweringTime)+'</span>';
      if(c.thcRange) h+='<span style="font-size:.65rem;color:var(--text-secondary)">THC '+U.esc(c.thcRange)+'</span>';
      h+='</div>';
      if(c.genetics) h+='<div style="font-size:.72rem;color:var(--text-tertiary);line-height:1.4">'+U.esc(c.genetics)+'</div>';
      if(c.flavors) h+='<div style="font-size:.72rem;color:var(--text-secondary);margin-top:2px"><b>Flavor:</b> '+U.esc(c.flavors)+'</div>';
      h+='</div>';
      if(added) h+='<span style="font-size:.7rem;color:var(--leaf);white-space:nowrap">&#10003; Added</span>';
      else h+='<button class="btn btn-primary btn-sm" onclick="Strains._addFromCatalog('+c._idx+')">+ Add</button>';
      h+='</div></div>';
    });
    if(!items.length) h='<div class="chart-no-data">No matches</div>';
    return h;
  },

  _filterCatalog(){
    const grid=document.getElementById('catalogGrid');
    const q=(document.getElementById('catalogSearch')||{}).value||'';
    if(grid) grid.innerHTML=Strains._buildCatalogGrid(q,Strains._catalogBreeder);
  },

  _addFromCatalog(idx){
    const c=Strains._catalog[idx];if(!c) return;
    const id=U.id('str');
    const data={
      id:id,name:c.name,type:c.type,breeder:c.clone&&c.source?c.source:c.breeder,
      genetics:c.genetics||'',floweringTime:c.floweringTime||'',
      difficulty:'',thcRange:c.thcRange||'',cbdRange:'',
      terpenes:'',effects:'',flavors:c.flavors||'',
      yieldIndoor:'',yieldOutdoor:'',growNotes:c.clone?'Clone from '+c.breeder+(c.source?' (bred by '+c.source+')':''):c.fem?'Feminized seed':'Regular seed',
      photo:'',archived:false,createdAt:Date.now()
    };
    Store.set('strains',id,data);
    Store.addActivity('strain_added','Added strain: '+data.name+' (from catalog)',id);
    Toast.show(data.name+' added to library!');
    // Refresh the catalog grid to show "Added" state
    Strains._filterCatalog();
  },

  _photoData:'',
  _onPhoto(input){
    if(!input.files||!input.files[0]) return;
    U.resizeImage(input.files[0],400,0.7,dataUrl=>{
      Strains._photoData=dataUrl;
      const prev=document.getElementById('strainPhotoPreview');
      if(prev){prev.src=dataUrl;prev.style.display='block'}
    });
  },

  _buildForm(s){

    h+='</select></div>';
    h+='<div class="form-group"><label class="form-label">Breeder</label><input class="form-input" id="f_breeder" value="'+U.esc(s.breeder||'')+'"></div></div>';
    h+='<div class="form-group"><label class="form-label">Genetics / Lineage</label><input class="form-input" id="f_genetics" placeholder="e.g. Blueberry x Haze" value="'+U.esc(s.genetics||'')+'"></div>';

    h+='</select></div></div>';
    h+='<div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md)">';
    h+='<div class="form-group"><label class="form-label">THC Range</label><input class="form-input" id="f_thcRange" placeholder="e.g. 17-24%" value="'+U.esc(s.thcRange||'')+'"></div>';
    h+='<div class="form-group"><label class="form-label">CBD Range</label><input class="form-input" id="f_cbdRange" placeholder="e.g. <1%" value="'+U.esc(s.cbdRange||'')+'"></div></div>';
    h+='<div class="form-group"><label class="form-label">Terpenes</label><input class="form-input" id="f_terpenes" placeholder="e.g. Myrcene, Caryophyllene" value="'+U.esc(s.terpenes||'')+'"></div>';
    h+='<div class="form-group"><label class="form-label">Effects</label><input class="form-input" id="f_effects" placeholder="e.g. Relaxing, Creative" value="'+U.esc(s.effects||'')+'"></div>';
    h+='<div class="form-group"><label class="form-label">Flavors</label><input class="form-input" id="f_flavors" placeholder="e.g. Berry, Sweet, Herbal" value="'+U.esc(s.flavors||'')+'"></div>';
    h+='<div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md)">';
    h+='<div class="form-group"><label class="form-label">Yield (Indoor)</label><select class="form-select" id="f_yieldIndoor"><option value="">—</option>';
    ['Low','Medium','Medium-High','High'].forEach(y=>{h+='<option value="'+y+'"'+(s.yieldIndoor===y?' selected':'')+'>'+y+'</option>'});
    h+='</select></div>';
    h+='<div class="form-group"><label class="form-label">Yield (Outdoor)</label><select class="form-select" id="f_yieldOutdoor"><option value="">—</option>';
    ['Low','Medium','Medium-High','High'].forEach(y=>{h+='<option value="'+y+'"'+(s.yieldOutdoor===y?' selected':'')+'>'+y+'</option>'});
    h+='</select></div></div>';
    h+='<div class="form-group"><label class="form-label">Grow Notes</label><textarea class="form-textarea" id="f_growNotes" rows="3">'+U.esc(s.growNotes||'')+'</textarea></div>';
    h+='<div class="form-group"><label class="form-label">Photo</label>';
    h+='<div style="cursor:pointer;border:1px dashed var(--border-subtle);border-radius:var(--radius-sm);padding:var(--space-md);text-align:center" onclick="document.getElementById(\'strainPhotoInput\').click()">';
    h+='<img id="strainPhotoPreview" src="'+(s.photo||'')+'" style="max-height:120px;display:'+(s.photo?'block':'none')+';margin:0 auto var(--space-sm)">';
    h+='<span style="font-size:.8rem;color:var(--text-secondary)">Click to upload photo</span>';
    h+='<input type="file" id="strainPhotoInput" accept="image/*" style="display:none" onchange="Strains._onPhoto(this)"></div></div>';
    return h;
  },

  _readForm(){
    const name=document.getElementById('f_strainName').value.trim();
    if(!name){Toast.show('Strain name is required','error');return null}
    return{
      name:name,
      type:document.getElementById('f_strainType').value,
      breeder:document.getElementById('f_breeder').value.trim(),
      genetics:document.getElementById('f_genetics').value.trim(),
      floweringTime:document.getElementById('f_floweringTime').value.trim(),
      difficulty:document.getElementById('f_difficulty').value,
      thcRange:document.getElementById('f_thcRange').value.trim(),
      cbdRange:document.getElementById('f_cbdRange').value.trim(),
      terpenes:document.getElementById('f_terpenes').value.trim(),
      effects:document.getElementById('f_effects').value.trim(),
      flavors:document.getElementById('f_flavors').value.trim(),
      yieldIndoor:document.getElementById('f_yieldIndoor').value,
      yieldOutdoor:document.getElementById('f_yieldOutdoor').value,
      growNotes:document.getElementById('f_growNotes').value.trim(),
      photo:Strains._photoData||document.getElementById('strainPhotoPreview').src||''
    };
  },

  openAddModal(){
    Strains._photoData='';
    Modal.open('Add Strain',Strains._buildForm(),
      '<button class="btn btn-ghost" onclick="Modal.close()">Cancel</button><button class="btn btn-primary" id="saveStrain">Save</button>');
    document.getElementById('saveStrain').addEventListener('click',()=>{
      const data=Strains._readForm();if(!data) return;
      const id=U.id('str');data.id=id;data.archived=false;data.createdAt=Date.now();
      Store.set('strains',id,data);
      Store.addActivity('strain_added','Added strain: '+data.name,id);
      Modal.close();Toast.show('Strain added!');
    });
  },

  openEditModal(id){
    const s=Store.getById('strains',id);if(!s) return;
    Strains._photoData='';
    Modal.open('Edit Strain',Strains._buildForm(s),
      '<button class="btn btn-ghost" onclick="Modal.close()">Cancel</button><button class="btn btn-primary" id="saveStrain">Save</button>');
    document.getElementById('saveStrain').addEventListener('click',()=>{
      const data=Strains._readForm();if(!data) return;
      const merged=Object.assign({},s,data);
      Store.set('strains',id,merged);
      Store.addActivity('strain_updated','Updated strain: '+data.name,id);
      Modal.close();Toast.show('Strain updated!');
    });
  },

  handleDelete(id){
    const s=Store.getById('strains',id);if(!s) return;
    Modal.confirm('Archive Strain','Archive "'+U.esc(s.name)+'"? You can re-import data to recover it.',()=>{
      s.archived=true;Store.set('strains',id,s);
      Store.addActivity('strain_archived','Archived strain: '+s.name,id);
      Toast.show('Strain archived');
    });
  }
};
window.Strains=Strains;

const Analytics={
  _dateRange:'30',
  _envFilter:'all',
  _plantFilter:'all',

  render(){
    let h='<div class="toolbar">';
    h+='<div style="display:flex;gap:var(--space-sm);flex-wrap:wrap">';
    h+='<select class="form-select" style="width:auto;min-width:110px" onchange="Analytics._onDateRange(this.value)">';
    ['7','30','90','all'].forEach(v=>{h+='<option value="'+v+'"'+(this._dateRange===v?' selected':'')+'>'+(v==='all'?'All Time':v+' Days')+'</option>'});
    h+='</select>';
    // env filter
    const envs=Store.environmentsArray();
    h+='<select class="form-select" style="width:auto;min-width:120px" onchange="Analytics._onEnvFilter(this.value)">';
    h+='<option value="all">All Environs</option>';
    envs.forEach(e=>{h+='<option value="'+e.id+'"'+(this._envFilter===e.id?' selected':'')+'>'+U.esc(e.name)+'</option>'});
    h+='</select>';
    // plant filter
    const plants=Store.mothersArray();
    h+='<select class="form-select" style="width:auto;min-width:120px" onchange="Analytics._onPlantFilter(this.value)">';
    h+='<option value="all">All Plants</option>';
    plants.forEach(m=>{h+='<option value="'+m.id+'"'+(this._plantFilter===m.id?' selected':'')+'>'+U.esc(m.strainName)+'</option>'});
    h+='</select></div></div>';

    h+='<div class="analytics-grid">';
    h+=this._envTrendsCard();
    h+=this._phDriftCard();
    h+=this._cloneSuccessCard();
    h+=Lineage.familyTreeCard();
    h+=this._healthDonutCard();
    h+=this._ipmOverviewCard();
    h+=this._activityHeatmapCard();
    h+=this._yieldTimelineCard();
    h+=this._yieldByStrainCard();
    h+=this._qualityDonutCard();
    h+=this._floweringYieldCard();
    h+=CostTracker._costBreakdownCard();
    h+=VPDCalc._vpdTrendCard(this._cutoff(),this._envFilter);
    h+=CostTracker._costPerGramByStrainCard();
    h+='</div>';
    document.getElementById('panel-analytics').innerHTML=h;
  },

  _cutoff(){
    if(this._dateRange==='all') return 0;
    return Date.now()-parseInt(this._dateRange)*86400000;
  },

  _onDateRange(v){this._dateRange=v;this.render()},
  _onEnvFilter(v){this._envFilter=v;this.render()},
  _onPlantFilter(v){this._plantFilter=v;this.render()},

  /* ── Chart 1: Environment Trends ── */
  _envTrendsCard(){
    let h='<div class="card chart-card"><div class="chart-title">Environment Trends</div>';
    h+='<div class="chart-subtitle">Temperature, Humidity, pH &amp; EC/PPM over time</div>';
    const cutoff=this._cutoff();
    let logs=Store.envArray().filter(l=>l.timestamp>=cutoff);
    if(this._envFilter!=='all') logs=logs.filter(l=>l.environmentId===this._envFilter);
    logs=logs.slice(0,60).reverse();
    if(logs.length<2){h+='<div class="chart-no-data">Need at least 2 readings for a trend chart</div></div>';return h}
    const ds=[];
    const makeDs=(key,label,color)=>{
      const vals=logs.filter(l=>l[key]!=null&&l[key]!=='').map(l=>({x:l.timestamp,y:parseFloat(l[key])}));
      if(vals.length) ds.push({label:label,values:vals,color:color});
    };
    makeDs('temperature','Temp (°F)','#e8721a');
    makeDs('humidity','RH (%)','#00c8c0');
    makeDs('ph','pH','#4a9e52');
    makeDs('ecPpm','EC/PPM','#f0b429');
    const xLabels=logs.map(l=>{const d=new Date(l.timestamp);return(d.getMonth()+1)+'/'+d.getDate()});
    h+=Chart.line(ds,{width:560,height:200,xLabels:xLabels,showDots:logs.length<=20});
    h+='<div class="chart-legend">';
    ds.forEach(d=>{h+='<div class="chart-legend-item"><div class="chart-legend-dot" style="background:'+d.color+'"></div>'+d.label+'</div>'});
    h+='</div></div>';
    return h;
  },

  /* ── Chart 2: Feeding pH Drift ── */
  _phDriftCard(){
    let h='<div class="card chart-card"><div class="chart-title">Feeding pH Drift</div>';
    h+='<div class="chart-subtitle">pH In vs pH Out over time</div>';
    const cutoff=this._cutoff();
    let feeds=Store.feedingsArray().filter(f=>f.timestamp>=cutoff);
    if(this._plantFilter!=='all') feeds=feeds.filter(f=>f.motherId===this._plantFilter);
    feeds=feeds.filter(f=>f.phIn||f.phOut).slice(0,60).reverse();
    if(feeds.length<2){h+='<div class="chart-no-data">Need at least 2 feeding records with pH data</div></div>';return h}
    const ds=[];
    const phIn=feeds.filter(f=>f.phIn).map(f=>({x:f.timestamp,y:parseFloat(f.phIn)}));
    const phOut=feeds.filter(f=>f.phOut).map(f=>({x:f.timestamp,y:parseFloat(f.phOut)}));
    if(phIn.length) ds.push({label:'pH In',values:phIn,color:'#00c8c0'});
    if(phOut.length) ds.push({label:'pH Out',values:phOut,color:'#f0b429'});
    const xLabels=feeds.map(f=>{const d=new Date(f.timestamp);return(d.getMonth()+1)+'/'+d.getDate()});
    h+=Chart.line(ds,{width:560,height:200,xLabels:xLabels,showDots:feeds.length<=20});
    h+='<div class="chart-legend">';
    ds.forEach(d=>{h+='<div class="chart-legend-item"><div class="chart-legend-dot" style="background:'+d.color+'"></div>'+d.label+'</div>'});
    h+='</div></div>';
    return h;
  },

  /* ── Chart 3: Clone Success Rate ── */
  _cloneSuccessCard(){
    let h='<div class="card chart-card"><div class="chart-title">Clone Success Rate</div>';
    h+='<div class="chart-subtitle">Success % by mother plant</div>';
    const mothers=Store.mothersArray();
    const data=[];
    mothers.forEach((m,i)=>{
      const rate=Store.cloneSuccessRate(m.id);
      if(rate!==null) data.push({label:m.strainName,value:rate,color:Chart._c(i)});
    });
    if(!data.length){h+='<div class="chart-no-data">No clone data available</div></div>';return h}
    h+=Chart.bar(data,{width:560,height:200});
    h+='</div>';
    return h;
  },

  /* ── Chart 4: Plant Health Distribution ── */
  _healthDonutCard(){
    let h='<div class="card chart-card"><div class="chart-title">Plant Health Distribution</div>';
    h+='<div class="chart-subtitle">Current health status of all mother plants</div>';
    const mothers=Store.mothersArray();
    const counts={};
    mothers.forEach(m=>{const hs=m.healthStatus||'healthy';counts[hs]=(counts[hs]||0)+1});
    const colorMap={thriving:'#2d6e35',healthy:'#4a9e52',stressed:'#f0b429',sick:'#e05c3a',quarantine:'#9b6bb5'};
    const data=Object.keys(counts).map(k=>({label:k.charAt(0).toUpperCase()+k.slice(1),value:counts[k],color:colorMap[k]||'#888'}));
    if(!data.length){h+='<div class="chart-no-data">No plants yet</div></div>';return h}
    h+='<div style="display:flex;align-items:center;gap:var(--space-xl);flex-wrap:wrap;justify-content:center">';
    h+=Chart.donut(data,{size:180,innerRadius:55});
    h+='<div class="chart-legend" style="flex-direction:column">';
    data.forEach(d=>{h+='<div class="chart-legend-item"><div class="chart-legend-dot" style="background:'+d.color+'"></div>'+d.label+' ('+d.value+')</div>'});
    h+='</div></div></div>';
    return h;
  },

  /* ── Chart 5: IPM Overview ── */
  _ipmOverviewCard(){
    let h='<div class="card chart-card"><div class="chart-title">IPM Issue Overview</div>';
    h+='<div class="chart-subtitle">Issues by type and severity</div>';
    const cutoff=this._cutoff();
    let logs=Store.ipmArray().filter(l=>l.timestamp>=cutoff);
    if(!logs.length){h+='<div class="chart-no-data">No IPM data in this period</div></div>';return h}
    const types=['pest','disease','deficiency'];
    const sevColors={low:'#4a9e52',medium:'#f0b429',high:'#e8721a',critical:'#e05c3a'};
    const data=types.map(t=>{
      const ofType=logs.filter(l=>l.issueType===t);
      const segments=['low','medium','high','critical'].map(sev=>({value:ofType.filter(l=>l.severity===sev).length,color:sevColors[sev],label:sev}));
      return{label:t.charAt(0).toUpperCase()+t.slice(1),segments:segments};
    }).filter(d=>d.segments.some(sg=>sg.value>0));
    if(!data.length){h+='<div class="chart-no-data">No IPM data in this period</div></div>';return h}
    h+=Chart.bar(data,{width:560,height:200});
    h+='<div class="chart-legend">';
    Object.keys(sevColors).forEach(s=>{h+='<div class="chart-legend-item"><div class="chart-legend-dot" style="background:'+sevColors[s]+'"></div>'+s.charAt(0).toUpperCase()+s.slice(1)+'</div>'});
    h+='</div></div>';
    return h;
  },

  /* ── Chart 6: Activity Timeline ── */
  _activityHeatmapCard(){
    let h='<div class="card chart-card"><div class="chart-title">Activity Timeline</div>';
    h+='<div class="chart-subtitle">Recent activity frequency</div>';
    const log=Store.get('activityLog');
    const actArr=Array.isArray(log)?log:[];
    const numWeeks=this._dateRange==='all'?12:Math.min(Math.ceil(parseInt(this._dateRange)/7),16);
    const now=new Date();
    const weeks=[];
    for(let w=numWeeks-1;w>=0;w--){
      const days=[];
      for(let d=0;d<7;d++){
        const day=new Date(now);
        day.setDate(day.getDate()-w*7-(6-d));
        day.setHours(0,0,0,0);
        const dayEnd=new Date(day);dayEnd.setDate(dayEnd.getDate()+1);
        const count=actArr.filter(a=>a.ts>=day.getTime()&&a.ts<dayEnd.getTime()).length;
        days.push(count);
      }
      weeks.push(days);
    }
    h+=Chart.heatmap(weeks,{cellSize:14});
    h+='</div>';
    return h;
  },

  /* ── Chart 7: Harvest Yield Over Time ── */
  _yieldTimelineCard(){
    let h='<div class="card chart-card"><div class="chart-title">Harvest Yield Over Time</div>';
    h+='<div class="chart-subtitle">Individual &amp; cumulative dry weight per harvest</div>';
    const cutoff=this._cutoff();
    let harvests=Store.harvestsArray().filter(hv=>hv.dryWeight>0&&hv.harvestDate);
    if(this._plantFilter!=='all') harvests=harvests.filter(hv=>hv.motherId===this._plantFilter);
    if(cutoff>0) harvests=harvests.filter(hv=>new Date(hv.harvestDate+'T00:00:00').getTime()>=cutoff);
    harvests=harvests.sort((a,b)=>(a.harvestDate||'').localeCompare(b.harvestDate||'')).slice(0,40);
    if(harvests.length<2){h+='<div class="chart-no-data">Need at least 2 harvests with dry weight for trend</div></div>';return h}
    let cumulative=0;
    const indivVals=[];const cumulVals=[];
    harvests.forEach((hv,i)=>{
      cumulative+=parseFloat(hv.dryWeight)||0;
      indivVals.push({x:i,y:parseFloat(hv.dryWeight)});
      cumulVals.push({x:i,y:cumulative});
    });
    const ds=[
      {label:'Per Harvest (g)',values:indivVals,color:'#00c8c0'},
      {label:'Cumulative (g)',values:cumulVals,color:'#f0b429'}
    ];
    const xLabels=harvests.map(hv=>{const d=new Date(hv.harvestDate+'T00:00:00');return(d.getMonth()+1)+'/'+d.getDate()});
    h+=Chart.line(ds,{width:560,height:200,xLabels:xLabels,showDots:harvests.length<=20});
    h+='<div class="chart-legend">';
    ds.forEach(d=>{h+='<div class="chart-legend-item"><div class="chart-legend-dot" style="background:'+d.color+'"></div>'+d.label+'</div>'});
    h+='</div></div>';
    return h;
  },

  /* ── Chart 8: Yield By Strain ── */
  _yieldByStrainCard(){
    let h='<div class="card chart-card"><div class="chart-title">Yield By Strain</div>';
    h+='<div class="chart-subtitle">Total dry weight per strain (g)</div>';
    const harvests=Store.harvestsArray().filter(hv=>hv.dryWeight>0);
    if(!harvests.length){h+='<div class="chart-no-data">No harvest data with dry weight</div></div>';return h}
    const byStrain={};
    harvests.forEach(hv=>{
      const m=hv.motherId?Store.getById('mothers',hv.motherId):null;
      const name=m?m.strainName:'Unknown';
      byStrain[name]=(byStrain[name]||0)+(parseFloat(hv.dryWeight)||0);
    });
    const data=Object.entries(byStrain).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([label,value],i)=>({label:label,value:Math.round(value*10)/10,color:Chart._c(i)}));
    h+=Chart.bar(data,{width:560,height:200});
    h+='</div>';
    return h;
  },

  /* ── Chart 9: Quality Distribution ── */
  _qualityDonutCard(){
    let h='<div class="card chart-card"><div class="chart-title">Harvest Quality Distribution</div>';
    h+='<div class="chart-subtitle">Star ratings across all harvests</div>';
    const harvests=Store.harvestsArray().filter(hv=>hv.quality>0);
    if(!harvests.length){h+='<div class="chart-no-data">No harvests with quality ratings</div></div>';return h}
    const counts={};let total=0;let sum=0;
    harvests.forEach(hv=>{const q=hv.quality;counts[q]=(counts[q]||0)+1;total++;sum+=q});
    const avg=(sum/total).toFixed(1);
    const starColors={'1':'#e05c3a','2':'#e8721a','3':'#f0b429','4':'#4a9e52','5':'#2d6e35'};
    const data=[1,2,3,4,5].filter(q=>counts[q]).map(q=>({label:q+'★',value:counts[q],color:starColors[q]}));
    h+='<div style="display:flex;align-items:center;gap:var(--space-xl);flex-wrap:wrap;justify-content:center">';
    h+=Chart.donut(data,{size:180,innerRadius:55,centerText:avg+'★'});
    h+='<div class="chart-legend" style="flex-direction:column">';
    data.forEach(d=>{h+='<div class="chart-legend-item"><div class="chart-legend-dot" style="background:'+d.color+'"></div>'+d.label+' ('+d.value+')</div>'});
    h+='<div style="font-size:.75rem;color:var(--text-tertiary);margin-top:var(--space-xs)">Average: '+avg+'★ across '+total+' harvests</div>';
    h+='</div></div></div>';
    return h;
  },

  /* ── Chart 10: Flowering Duration vs Yield ── */
  _floweringYieldCard(){
    let h='<div class="card chart-card"><div class="chart-title">Flowering Duration vs Yield</div>';
    h+='<div class="chart-subtitle">Dry weight by flowering days</div>';
    const harvests=Store.harvestsArray().filter(hv=>hv.dryWeight>0&&hv.floweringStart);
    if(!harvests.length){h+='<div class="chart-no-data">Need harvests with flowering start date and dry weight</div></div>';return h}
    const data=harvests.slice(0,15).map((hv,i)=>{
      const m=hv.motherId?Store.getById('mothers',hv.motherId):null;
      const endD=hv.floweringEnd?U.parseDate(hv.floweringEnd):hv.harvestDate?U.parseDate(hv.harvestDate):new Date();
      const days=U.daysBetween(U.parseDate(hv.floweringStart),endD);
      const name=(m?m.strainName:'?')+' ('+days+'d)';
      return{label:name,value:Math.round((parseFloat(hv.dryWeight)||0)*10)/10,color:Chart._c(i)};
    }).sort((a,b)=>b.value-a.value);
    h+=Chart.bar(data,{width:560,height:200});
    h+='</div>';
    return h;
  }
};
