const RoomDiagram={
  _envId:null,_rows:4,_cols:4,_layout:{},
  _roomWidth:'',_roomLength:'',
  _POT_SIZES:[1,2,3,5,7,10,15,20,25,30],
  _MEDIA:['Soil','Coco','Hydro','Perlite','Rockwool','Living Soil','Other'],
  _DEFAULT_POT:'5',_DEFAULT_MEDIUM:'Soil',
  _migrateCell(val){
    if(typeof val==='string') return{motherId:val,potSize:this._DEFAULT_POT,medium:this._DEFAULT_MEDIUM};
    if(val&&typeof val==='object') return{motherId:val.motherId||'',potSize:val.potSize||this._DEFAULT_POT,medium:val.medium||this._DEFAULT_MEDIUM};
    return null;
  },
  open(envId){
    if(!envId){
      var envs=Store.environmentsArray();
      if(!envs.length){Toast.show('Add an environment first','error');return}
      var h='<p style="font-size:.82rem;color:var(--text-secondary);margin-bottom:var(--space-md)">Select an environment to design its room layout:</p>';
      envs.forEach(function(e){
        h+='<button class="btn btn-outline" style="display:block;width:100%;margin-bottom:var(--space-xs);text-align:left" onclick="RoomDiagram.open(\''+e.id+'\')">'+U.esc(e.name)+'</button>';
      });
      Modal.open('&#128208; Room Layout',h,'<button class="btn btn-ghost" onclick="Modal.close()">Close</button>');
      return;
    }
    this._envId=envId;
    var saved=(Store.setting('roomLayouts')||{})[envId];
    if(saved){
      this._rows=saved.rows||4;this._cols=saved.cols||4;
      this._roomWidth=saved.roomWidth||'';this._roomLength=saved.roomLength||'';
      this._layout={};
      var rawCells=saved.cells||{};
      for(var k in rawCells){if(rawCells.hasOwnProperty(k)){var mc=this._migrateCell(rawCells[k]);if(mc) this._layout[k]=mc}}
    }else{this._rows=4;this._cols=4;this._roomWidth='';this._roomLength='';this._layout={}}
    this._render();
  },
  _render(){
    var env=Store.getById('environments',this._envId);
    var self=this;
    /* Grid dimensions */
    var h='<div class="form-row" style="margin-bottom:var(--space-sm)"><div class="form-group" style="margin-bottom:0"><label class="form-label">Rows</label>';
    h+='<input class="form-input" type="number" id="f_gridRows" value="'+this._rows+'" min="1" max="10" onchange="RoomDiagram._rows=parseInt(this.value)||4;RoomDiagram._render()"></div>';
    h+='<div class="form-group" style="margin-bottom:0"><label class="form-label">Columns</label>';
    h+='<input class="form-input" type="number" id="f_gridCols" value="'+this._cols+'" min="1" max="10" onchange="RoomDiagram._cols=parseInt(this.value)||4;RoomDiagram._render()"></div></div>';
    /* Room dimensions */
    h+='<div class="form-row" style="margin-bottom:var(--space-md)"><div class="form-group" style="margin-bottom:0"><label class="form-label">Room Width (ft)</label>';
    h+='<input class="form-input" type="number" id="f_roomWidth" value="'+U.esc(this._roomWidth)+'" min="1" max="100" step="0.5" placeholder="optional" onchange="RoomDiagram._roomWidth=this.value"></div>';
    h+='<div class="form-group" style="margin-bottom:0"><label class="form-label">Room Length (ft)</label>';
    h+='<input class="form-input" type="number" id="f_roomLength" value="'+U.esc(this._roomLength)+'" min="1" max="100" step="0.5" placeholder="optional" onchange="RoomDiagram._roomLength=this.value"></div></div>';
    if(this._roomWidth&&this._roomLength){
      var sqft=(parseFloat(this._roomWidth)*parseFloat(this._roomLength)).toFixed(1);
      h+='<div class="room-dims">Room: '+U.esc(this._roomWidth)+' ft &times; '+U.esc(this._roomLength)+' ft = '+sqft+' sq ft</div>';
    }
    /* Grid */
    h+='<div style="display:grid;grid-template-columns:repeat('+this._cols+',1fr);gap:4px;margin-bottom:var(--space-md)">';
    for(var r=0;r<this._rows;r++){
      for(var c=0;c<this._cols;c++){
        var key=r+','+c;
        var cell=this._layout[key];
        var mid=cell?cell.motherId:'';
        var m=mid?Store.getById('mothers',mid):null;
        var potLabel=cell?(cell.potSize||self._DEFAULT_POT)+'g':'';
        var medLabel=cell?(cell.medium||self._DEFAULT_MEDIUM):'';
        if(m){
          h+='<div class="grid-cell occupied" onclick="RoomDiagram._cellClick('+r+','+c+')" title="'+U.esc(m.strainName)+' — Click to edit">';
          h+='<div class="gc-name">'+U.esc(m.strainName)+'</div>';
          h+='<span class="gc-health badge-'+m.healthStatus+'">'+m.healthStatus+'</span>';
          h+='<div class="gc-pot">'+U.esc(potLabel)+'</div>';
          h+='<div class="gc-medium">'+U.esc(medLabel)+'</div></div>';
        }else if(cell){
          h+='<div class="grid-cell" onclick="RoomDiagram._cellClick('+r+','+c+')" title="Click to edit">';
          h+='<div class="gc-pot">'+U.esc(potLabel)+'</div>';
          h+='<div class="gc-medium">'+U.esc(medLabel)+'</div>';
          h+='<div class="gc-empty-label">empty</div></div>';
        }else{
          h+='<div class="grid-cell" onclick="RoomDiagram._cellClick('+r+','+c+')" title="Click to configure">+</div>';
        }
      }
    }
    h+='</div>';
    /* Summary */
    h+=this._summaryHtml();
    /* Unplaced plants */
    var assignedIds=[];
    for(var k in this._layout){if(this._layout[k]&&this._layout[k].motherId) assignedIds.push(this._layout[k].motherId)}
    var unassigned=Store.mothersArray().filter(function(m){return m.environmentId===self._envId&&assignedIds.indexOf(m.id)===-1});
    if(unassigned.length){
      h+='<div style="font-size:.72rem;color:var(--text-tertiary);margin-bottom:var(--space-xs)">Unplaced: '+unassigned.map(function(m){return U.esc(m.strainName)}).join(', ')+'</div>';
    }
    Modal.open('&#128208; Room Layout'+(env?' &mdash; '+U.esc(env.name):''),h,
      '<button class="btn btn-ghost" onclick="Modal.close()">Close</button><button class="btn btn-primary" onclick="RoomDiagram._save()">Save Layout</button>');
  },
  _summaryHtml(){
    var totalPlants=0,totalPotVol=0,mediumCounts={};
    for(var k in this._layout){
      var cell=this._layout[k];if(!cell) continue;
      var ps=parseFloat(cell.potSize||this._DEFAULT_POT)||0;
      totalPotVol+=ps;
      var med=cell.medium||this._DEFAULT_MEDIUM;
      mediumCounts[med]=(mediumCounts[med]||0)+1;
      if(cell.motherId) totalPlants++;
    }
    if(!totalPlants&&!totalPotVol) return '';
    var h='<div class="room-summary">';
    h+='<div class="rs-stat"><div class="rs-val">'+totalPlants+'</div><div class="rs-lbl">Plants Placed</div></div>';
    h+='<div class="rs-stat"><div class="rs-val">'+totalPotVol+' gal</div><div class="rs-lbl">Total Pot Volume</div></div>';
    var medParts=[];for(var m in mediumCounts){medParts.push(U.esc(m)+': '+mediumCounts[m])}
    if(medParts.length){
      h+='<div class="rs-stat"><div class="rs-val" style="font-size:.78rem">'+medParts.join(', ')+'</div><div class="rs-lbl">By Medium</div></div>';
    }
    h+='</div>';
    return h;
  },
  _cellClick(r,c){
    var key=r+','+c;
    var cell=this._layout[key]||{motherId:'',potSize:this._DEFAULT_POT,medium:this._DEFAULT_MEDIUM};
    var mid=cell.motherId||'';
    var m=mid?Store.getById('mothers',mid):null;
    var self=this;
    var h='<p style="font-size:.82rem;color:var(--text-secondary);margin-bottom:var(--space-md)">Cell: Row '+(r+1)+', Column '+(c+1)+'</p>';
    /* Pot size */
    h+='<div class="form-row"><div class="form-group"><label class="form-label">Pot Size (gal)</label><select class="form-select" id="f_cellPot">';
    this._POT_SIZES.forEach(function(s){h+='<option value="'+s+'"'+(String(s)===String(cell.potSize)?' selected':'')+'>'+s+' gal</option>'});
    h+='</select></div>';
    /* Medium */
    h+='<div class="form-group"><label class="form-label">Growing Medium</label><select class="form-select" id="f_cellMedium">';
    this._MEDIA.forEach(function(med){h+='<option value="'+med+'"'+(med===cell.medium?' selected':'')+'>'+med+'</option>'});
    h+='</select></div></div>';
    /* Plant info or picker */
    if(m){
      h+='<div style="padding:var(--space-sm);border:1px solid rgba(74,158,82,.3);border-radius:var(--radius-sm);background:rgba(74,158,82,.06);margin-bottom:var(--space-md)">';
      h+='<span style="font-weight:600">'+U.esc(m.strainName)+'</span>';
      h+=' <span class="badge-'+m.healthStatus+'" style="font-size:.6rem;padding:1px 6px;border-radius:3px">'+m.healthStatus+'</span></div>';
      h+='<button class="btn btn-danger btn-sm" style="margin-bottom:var(--space-sm)" onclick="RoomDiagram._removeFromCell(\''+key+'\')">Remove Plant</button>';
    }else{
      var assignedIds=[];for(var ak in self._layout){if(self._layout[ak]&&self._layout[ak].motherId) assignedIds.push(self._layout[ak].motherId)}
      var available=Store.mothersArray().filter(function(p){return p.environmentId===self._envId&&assignedIds.indexOf(p.id)===-1});
      if(available.length){
        h+='<div class="form-group"><label class="form-label">Assign Plant</label><select class="form-select" id="f_cellPlant"><option value="">— None —</option>';
        available.forEach(function(p){h+='<option value="'+p.id+'">'+U.esc(p.strainName)+' ('+p.healthStatus+')</option>'});
        h+='</select></div>';
      }else{
        h+='<div style="font-size:.78rem;color:var(--text-tertiary);margin-bottom:var(--space-sm)">All plants in this environment are placed.</div>';
      }
    }
    Modal.open('Edit Cell',h,
      '<button class="btn btn-ghost" onclick="RoomDiagram._render()">Back</button><button class="btn btn-primary" onclick="RoomDiagram._saveCellEdit(\''+key+'\')">Apply</button>');
  },
  _saveCellEdit(key){
    var potEl=document.getElementById('f_cellPot');
    var medEl=document.getElementById('f_cellMedium');
    var plantEl=document.getElementById('f_cellPlant');
    var existing=this._layout[key]||{};
    var newCell={motherId:existing.motherId||'',potSize:potEl?potEl.value:this._DEFAULT_POT,medium:medEl?medEl.value:this._DEFAULT_MEDIUM};
    if(plantEl&&plantEl.value) newCell.motherId=plantEl.value;
    this._layout[key]=newCell;
    this._render();
  },
  _removeFromCell(key){
    var cell=this._layout[key];
    if(cell) cell.motherId='';
    this._render();
  },
  _save(){
    var layouts=Store.setting('roomLayouts')||{};
    layouts[this._envId]={rows:this._rows,cols:this._cols,roomWidth:this._roomWidth,roomLength:this._roomLength,cells:this._layout};
    Store.setting('roomLayouts',layouts);
    Toast.show('Room layout saved!');Modal.close();
  }
};
window.RoomDiagram=RoomDiagram;

/* ═══════════════════════════════════════════════
   CLOUD SYNC (Firebase)
   ═══════════════════════════════════════════════ */
const CloudSync={
  _fb:null,_auth:null,_db:null,
  _loaded:false,_loading:false,
  _autoTimer:null,
  _AUTO_DEBOUNCE:300000, // 5 min

  _loadSDK(cb){
    if(this._loaded){cb();return}
    if(this._loading){setTimeout(function(){CloudSync._loadSDK(cb)},500);return}
    this._loading=true;
    var base='https://www.gstatic.com/firebasejs/10.12.0/';
    _loadScript(base+'firebase-app-compat.js',function(e1){
      if(e1){CloudSync._loading=false;cb(e1);return}
      _loadScript(base+'firebase-auth-compat.js',function(e2){
        if(e2){CloudSync._loading=false;cb(e2);return}
        _loadScript(base+'firebase-firestore-compat.js',function(e3){
          CloudSync._loading=false;
          if(e3){cb(e3);return}
          CloudSync._loaded=true;cb();
        });
      });
    });
  },

  _initFirebase(){
    var config=Store.setting('firebaseConfig');
    if(!config) return false;
    if(this._fb) return true;
    try{
      this._fb=firebase.initializeApp(config);
      this._auth=firebase.auth();
      this._db=firebase.firestore();
      return true;
    }catch(e){Toast.show('Firebase init failed: '+e.message);return false}
  },

  signIn(cb){
    if(!this._auth){cb('Firebase not initialized.');return}
    var provider=new firebase.auth.GoogleAuthProvider();
    this._auth.signInWithPopup(provider).then(function(result){
      cb(null,result.user);
    }).catch(function(err){
      if(err.code==='auth/popup-closed-by-user') cb('Sign-in cancelled.');
      else if(err.code==='auth/network-request-failed') cb('Network error \u2014 are you offline?');
      else cb('Sign-in failed: '+err.message);
    });
  },

  signOut(cb){
    if(!this._auth){cb();return}
    this._auth.signOut().then(function(){cb()});
  },

  _prepareData(){
    var data=JSON.parse(JSON.stringify(Store._data));
    if(Store.setting('cloudStripPhotos')){
      if(data.mothers) Object.values(data.mothers).forEach(function(m){if(m.photo&&m.photo.indexOf('data:')===0) m.photo='[stripped]'});
      if(data.photoJournal) Object.values(data.photoJournal).forEach(function(p){if(p.photoData&&p.photoData.indexOf('data:')===0) p.photoData='[stripped]'});
      if(data.harvests) Object.values(data.harvests).forEach(function(h){if(h.photoData&&h.photoData.indexOf('data:')===0) h.photoData='[stripped]'});
    }
    return data;
  },

  _estimateSize(data){return JSON.stringify(data).length},

  backup(cb){
    if(!this._db||!this._auth||!this._auth.currentUser){cb('Not signed in.');return}
    var uid=this._auth.currentUser.uid;
    var data=this._prepareData();
    var size=this._estimateSize(data);
    if(size>1040000){cb('Data exceeds Firestore 1MB limit. Enable "Strip photos" in sync settings.');return}
    var raw=JSON.stringify(data);
    var payload={data:data,checksum:Store._checksum(raw),version:APP_VERSION,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),userEmail:this._auth.currentUser.email||''};
    this._db.collection('plantManager').doc(uid).set(payload).then(function(){
      var ts=Date.now();
      Store.setting('cloudLastBackup',ts);
      Store.addActivity('cloud_backup','Data backed up to cloud');
      cb(null,ts);
    }).catch(function(err){
      if(err.code==='permission-denied') cb('Permission denied. Check Firestore security rules.');
      else if(err.code==='unavailable') cb('Cloud unavailable \u2014 are you offline?');
      else cb('Backup failed: '+err.message);
    });
  },

  restore(cb){
    if(!this._db||!this._auth||!this._auth.currentUser){cb('Not signed in.');return}
    var uid=this._auth.currentUser.uid;
    this._db.collection('plantManager').doc(uid).get().then(function(doc){
      if(!doc.exists){cb('No cloud backup found for this account.');return}
      var payload=doc.data();
      var raw=JSON.stringify(payload.data);
      var cs=Store._checksum(raw);
      if(cs!==payload.checksum){cb('Cloud data checksum mismatch. Backup may be corrupted.');return}
      var backupDate=payload.updatedAt?payload.updatedAt.toDate().toLocaleString():'unknown date';
      Modal.confirm('Restore from Cloud','Replace all local data with cloud backup from '+backupDate+'?<br><br><strong>This will overwrite your current local data.</strong>',function(){
        Store._data=payload.data;Store.save();Store.notify();
        Store.addActivity('cloud_restore','Data restored from cloud backup');
        Toast.show('Data restored from cloud!');
        Router.switchTo(Router._current);
        cb(null);
      });
    }).catch(function(err){
      if(err.code==='unavailable') cb('Cloud unavailable \u2014 are you offline?');
      else cb('Restore failed: '+err.message);
    });
  },

  scheduleAutoBackup(){
    if(!Store.setting('cloudAutoBackup')) return;
    if(!this._auth||!this._auth.currentUser) return;
    clearTimeout(this._autoTimer);
    this._autoTimer=setTimeout(function(){
      CloudSync.backup(function(err){if(err) console.warn('Auto-backup failed:',err)});
    },this._AUTO_DEBOUNCE);
  },

  _updateBadge(){
    var btn=document.getElementById('cloudSyncBtn');if(!btn) return;
    var badge=btn.querySelector('.sync-badge');
    var lastBackup=Store.setting('cloudLastBackup');
    if(!Store.setting('firebaseConfig')||!lastBackup){if(badge) badge.remove();return}
    if(!badge){badge=document.createElement('span');badge.className='sync-badge';btn.appendChild(badge)}
    var age=Date.now()-lastBackup;
    if(age<3600000) badge.className='sync-badge synced';
    else if(age<86400000) badge.className='sync-badge stale';
    else badge.className='sync-badge error';
  },

  openSettings(){
    var self=this;
    if(!this._loaded){
      Toast.show('Loading cloud sync...');
      this._loadSDK(function(err){
        if(err){Toast.show('Failed to load Firebase SDK. Check your internet connection.');return}
        self.openSettings();
      });
      return;
    }
    this._initFirebase();
    var config=Store.setting('firebaseConfig');
    var user=this._auth?this._auth.currentUser:null;
    var lastBackup=Store.setting('cloudLastBackup');
    var stripPhotos=Store.setting('cloudStripPhotos')!==false;
    var autoBackup=Store.setting('cloudAutoBackup')===true;
    var h='';

    /* Firebase Config */
    h+='<div class="notify-section" style="margin-top:0;border-top:none">';
    h+='<div class="notify-section-title">Firebase Project</div>';
    if(config){
      h+='<div style="font-size:.8rem;color:var(--leaf);margin-bottom:var(--space-sm)">\u2713 Configured ('+U.esc(config.projectId||'unknown')+')</div>';
      h+='<button class="btn btn-ghost btn-sm" id="csChangeConfig">Change Config</button>';
    }else{
      h+='<div class="form-group"><label class="form-label">Paste Firebase config (JS or JSON)</label>';
      h+='<textarea class="form-textarea" id="f_fbConfig" rows="6" placeholder=\'Paste the firebaseConfig from Firebase Console.\nAccepts both JS object and JSON format.\'></textarea>';
      h+='<div class="form-hint">Firebase Console \u2192 Project Settings \u2192 Web App \u2192 copy the config snippet</div></div>';
    }
    h+='</div>';

    /* Auth */
    h+='<div class="notify-section"><div class="notify-section-title">Account</div>';
    if(user){
      h+='<div style="font-size:.85rem;margin-bottom:var(--space-sm)">Signed in as <strong>'+U.esc(user.email||'anonymous')+'</strong></div>';
      h+='<button class="btn btn-ghost btn-sm" id="csSignOut">Sign Out</button>';
    }else if(config){
      h+='<button class="btn btn-primary btn-sm" id="csSignIn">&#128274; Sign in with Google</button>';
    }else{
      h+='<div style="font-size:.8rem;color:var(--text-tertiary)">Configure Firebase project first</div>';
    }
    h+='</div>';

    /* Backup / Restore */
    if(user){
      h+='<div class="notify-section"><div class="notify-section-title">Backup &amp; Restore</div>';
      h+='<div style="display:flex;gap:var(--space-sm);margin-bottom:var(--space-md)">';
      h+='<button class="btn btn-primary btn-sm" id="csBackup">&#9729; Backup Now</button>';
      h+='<button class="btn btn-outline btn-sm" id="csRestore">&#8681; Restore</button>';
      h+='</div>';
      if(lastBackup) h+='<div style="font-size:.75rem;color:var(--text-secondary)">Last backup: '+new Date(lastBackup).toLocaleString()+'</div>';
      h+='</div>';

      /* Options */
      h+='<div class="notify-section"><div class="notify-section-title">Options</div>';
      h+='<label class="notify-toggle"><input type="checkbox" id="cs_stripPhotos"'+(stripPhotos?' checked':'')+'>Strip photos from backup (recommended)</label>';
      h+='<div class="form-hint" style="margin-left:26px">Keeps backup under Firestore 1MB limit</div>';
      h+='<label class="notify-toggle"><input type="checkbox" id="cs_autoBackup"'+(autoBackup?' checked':'')+'>Auto-backup every 5 minutes</label>';
      h+='</div>';
    }

    /* Size estimate */
    var estData=user?this._prepareData():Store._data;
    var sizeEst=this._estimateSize(estData);
    h+='<div style="margin-top:var(--space-md);font-size:.72rem;color:var(--text-tertiary)">Estimated backup size: '+(sizeEst/1024).toFixed(0)+' KB'+(sizeEst>900000?' \u26a0 near limit':'')+'</div>';

    /* Firestore rules hint */
    h+='<details style="margin-top:var(--space-md);font-size:.72rem;color:var(--text-tertiary)"><summary style="cursor:pointer">Firestore security rules</summary>';
    h+='<pre style="margin-top:var(--space-xs);padding:var(--space-sm);background:var(--bg-input);border-radius:var(--radius-sm);font-size:.65rem;overflow-x:auto">match /plantManager/{userId} {\n  allow read, write: if request.auth != null\n    &amp;&amp; request.auth.uid == userId;\n}</pre></details>';

    Modal.open('Cloud Sync',h,
      '<button class="btn btn-ghost" onclick="Modal.close()">Cancel</button><button class="btn btn-primary" id="csSave">Save</button>'
    );

    /* Wire up events */
    var saveBtn=document.getElementById('csSave');
    if(saveBtn) saveBtn.addEventListener('click',function(){
      var configTA=document.getElementById('f_fbConfig');
      if(configTA&&configTA.value.trim()){
        try{
          var raw=configTA.value.trim();
          /* Strip "const firebaseConfig = " or "var firebaseConfig = " wrapper */
          raw=raw.replace(/^(?:const|let|var)\s+\w+\s*=\s*/,'').replace(/;\s*$/,'');
          /* Convert JS object literal to valid JSON (quote unquoted keys) */
          raw=raw.replace(/([{,]\s*)(\w+)\s*:/g,'$1"$2":');
          var parsed=JSON.parse(raw);
          if(!parsed.apiKey||!parsed.projectId) throw new Error('Missing apiKey or projectId');
          Store.setting('firebaseConfig',parsed);
          self._fb=null;self._auth=null;self._db=null;
          self._initFirebase();
        }catch(e){Toast.show('Invalid Firebase config: '+e.message);return}
      }
      var spEl=document.getElementById('cs_stripPhotos'),abEl=document.getElementById('cs_autoBackup');
      if(spEl) Store.setting('cloudStripPhotos',spEl.checked);
      if(abEl) Store.setting('cloudAutoBackup',abEl.checked);
      self._updateBadge();
      Modal.close();Toast.show('Cloud sync settings saved!');
    });

    var signInBtn=document.getElementById('csSignIn');
    if(signInBtn) signInBtn.addEventListener('click',function(){
      signInBtn.disabled=true;signInBtn.textContent='Signing in...';
      self.signIn(function(err,user){
        if(err){Toast.show(err);signInBtn.disabled=false;signInBtn.innerHTML='&#128274; Sign in with Google';return}
        Toast.show('Signed in as '+user.email);Modal.close();self.openSettings();
      });
    });

    var signOutBtn=document.getElementById('csSignOut');
    if(signOutBtn) signOutBtn.addEventListener('click',function(){
      self.signOut(function(){Toast.show('Signed out.');Modal.close();self.openSettings()});
    });

    var backupBtn=document.getElementById('csBackup');
    if(backupBtn) backupBtn.addEventListener('click',function(){
      backupBtn.disabled=true;backupBtn.textContent='Backing up...';
      self.backup(function(err,ts){
        backupBtn.disabled=false;backupBtn.innerHTML='&#9729; Backup Now';
        if(err){Toast.show(err);return}
        Toast.show('Backup complete!');self._updateBadge();Modal.close();self.openSettings();
      });
    });

    var restoreBtn=document.getElementById('csRestore');
    if(restoreBtn) restoreBtn.addEventListener('click',function(){
      Modal.close();
      self.restore(function(err){if(err) Toast.show(err)});
    });

    var changeBtn=document.getElementById('csChangeConfig');
    if(changeBtn) changeBtn.addEventListener('click',function(){
      Store.setting('firebaseConfig',null);
      self._fb=null;self._auth=null;self._db=null;
      Modal.close();self.openSettings();
    });
  }
};
window.CloudSync=CloudSync;

/* ═══════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════ */
function init(){
  Store.load();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('/service-worker.js').catch(function(){});
  Theme.init();
  HeroToggle.init();
  Modal.init();
  DataIO.init();
  Notify.init();
  Weather.init();
  document.getElementById('weatherBtn').addEventListener('click',()=>Weather.openSettings());
  document.getElementById('moonBtn').addEventListener('click',()=>Moon.openDetail());
  document.getElementById('cloudSyncBtn').addEventListener('click',()=>CloudSync.openSettings());
  /* Settings overflow menu */
  var sBtn=document.getElementById('settingsBtn'),sMenu=document.getElementById('settingsMenu');
  sBtn.addEventListener('click',function(e){e.stopPropagation();sMenu.classList.toggle('open')});
  document.addEventListener('click',function(){sMenu.classList.remove('open')});
  sMenu.addEventListener('click',function(){sMenu.classList.remove('open')});
  document.getElementById('appVersion').textContent='v'+APP_VERSION;
  Store.subscribe(()=>{
    const tab=Router._current;
    const renderers={dashboard:Dashboard,plants:Plants,environments:Environments,clones:Clones,tasks:Tasks,feeding:Feeding,journal:Journal,ipm:IPM,harvest:Harvest,strains:Strains,analytics:Analytics,calendar:Calendar,environment:Environment};
    if(renderers[tab]) renderers[tab].render();
    Notify._updateBadge();
    CloudSync._updateBadge();
  });
  Router.init();
  WhatsNew.check();
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();

})();
</script>
