    const strains=Object.keys(byStrain).sort();
    const data=strains.map((s,i)=>{
      const share=totalYield>0?(byStrain[s].yield/totalYield)*unattr:0;
      const cost=byStrain[s].directCost+share;
      const cpg=byStrain[s].yield>0?cost/byStrain[s].yield:0;
      return{label:s,value:parseFloat(cpg.toFixed(2)),color:Chart._c(i)};
    });
    let h='<div class="card chart-card"><div class="chart-title">&#128176; Cost per Gram by Strain</div>';
    h+='<div class="chart-subtitle">Expenses allocated by strain (direct + proportional shared)</div>';
    h+=Chart.bar(data,{height:220,unit:'$/g'});
    h+='</div>';
    return h;
  },
  _expensesForPlantReport(mid){
    const m=Store.getById('mothers',mid);if(!m) return '';
    const direct=Store.expensesForMother(mid);
    if(!direct.length) return '';
    const total=direct.reduce((s,e)=>s+e.amount,0);
    const harvests=Store.harvestsForMother(mid);
    const yield_=harvests.reduce((s,h)=>s+(parseFloat(h.dryWeight)||0),0);
    let b='<div class="rpt-section"><h2>&#128176; Expenses</h2>';
    b+='<table class="rpt-table"><thead><tr><th>Date</th><th>Category</th><th>Description</th><th>Amount</th></tr></thead><tbody>';
    direct.forEach(e=>{
      const d=new Date(e.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      b+='<tr><td>'+d+'</td><td>'+U.esc(e.category||'—')+'</td><td>'+U.esc(e.description||'—')+'</td><td>$'+e.amount.toFixed(2)+'</td></tr>';
    });
    b+='</tbody></table>';
    b+='<p style="margin-top:8px"><strong>Total: $'+total.toFixed(2)+'</strong>';
    if(yield_>0) b+=' &bull; Cost per gram: <strong>$'+(total/yield_).toFixed(2)+'/g</strong>';
    b+='</p></div>';
    return b;
  }
};

    tropicalLiving:{name:'Tropical Living Soil',desc:'Outdoor tropical (Maui-style)',base:{'Compost':.40,'Coco Coir':.25},aeration:{'Pumice':.20,'Rice Hulls':.15},amend:{'Worm Castings':.5,'Bone Meal':.25,'Kelp Meal':.25,'Azomite':.25,'Dolomite Lime':.125}}
  },
  open(){
    let h='<div class="fs-grid">';
    Object.keys(this._recipes).forEach(k=>{
      const r=this._recipes[k];
      h+='<div class="fs-card" onclick="SoilMixCalc._openCalc(\''+k+'\')">';
      h+='<h3>'+U.esc(r.name)+'</h3><p>'+U.esc(r.desc)+'</p></div>';

    if(saved.length){
      h+='<div style="margin-top:var(--space-lg)"><div class="smc-title">Saved Recipes</div>';
      saved.forEach(s=>{
        h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-xs) 0;border-bottom:1px solid rgba(255,255,255,.04)">';
        h+='<span style="font-size:.82rem;cursor:pointer;color:var(--cyan)" onclick="SoilMixCalc._loadSaved(\''+s.id+'\')">'+U.esc(s.name)+'</span>';

  _openCalc(key){
    const r=key!=='custom'?this._recipes[key]:null;
    const base=JSON.parse(JSON.stringify(this._base));
    const aer=JSON.parse(JSON.stringify(this._aeration));
    const amend=JSON.parse(JSON.stringify(this._amendments));
    if(r){
      base.forEach(b=>{b.ratio=r.base[b.name]||0});
      aer.forEach(a=>{a.ratio=r.aeration[a.name]||0});
      amend.forEach(a=>{a.amt=r.amend&&r.amend[a.name]!==undefined?r.amend[a.name]:0});
    }
    this._curBase=base;this._curAer=aer;this._curAmend=amend;this._volume=5;this._unit='gal';
    let h='<div style="display:flex;gap:var(--space-sm);align-items:center;margin-bottom:var(--space-md);flex-wrap:wrap">';
    h+='<label class="form-label" style="margin:0">Volume:</label><input class="form-input" type="number" id="smcVol" value="5" min="1" step="1" style="width:80px">';
    h+='<select class="form-select" id="smcUnit" style="width:70px"><option value="gal">gal</option><option value="L">L</option></select></div>';
    h+='<div class="smc-title">Base Mix</div><div id="smcBase"></div>';
    h+='<div class="smc-title">Aeration</div><div id="smcAer"></div>';
    h+='<div class="smc-title">Amendments (cups per gallon of soil)</div><div id="smcAmend"></div>';
    const title=r?'&#127793; '+U.esc(r.name):'&#127793; Custom Soil Mix';
    let foot='<button class="btn btn-primary" onclick="SoilMixCalc._saveRecipe()">Save Recipe</button>';
    foot+='<button class="btn btn-outline" onclick="SoilMixCalc.open()">&larr; Back</button>';

    const self=this;
    setTimeout(function(){
      self._renderRows();
      const vol=document.getElementById('smcVol');
      const unit=document.getElementById('smcUnit');
      if(vol) vol.addEventListener('input',function(){self._volume=parseFloat(this.value)||1;self._renderRows()});
      if(unit) unit.addEventListener('change',function(){self._unit=this.value;self._renderRows()});
    },120);
  },
  _renderRows(){
    const v=this._volume;const isL=this._unit==='L';const conv=isL?0.264172:1;
    const galVol=v*conv;
    const totalBase=this._curBase.reduce((s,b)=>s+b.ratio,0)||1;
    const totalAer=this._curAer.reduce((s,a)=>s+a.ratio,0)||1;
    const totalParts=totalBase+totalAer;
    let h='';
    this._curBase.forEach((b,i)=>{
      const amt=totalParts>0?(b.ratio/totalParts)*galVol:0;
      h+='<div class="smc-row"><div><div class="smc-name">'+U.esc(b.name)+'</div><div class="smc-desc">'+U.esc(b.desc)+'</div></div>';
      h+='<input class="smc-input" type="number" step="0.01" min="0" value="'+b.ratio.toFixed(2)+'" onchange="SoilMixCalc._curBase['+i+'].ratio=parseFloat(this.value)||0;SoilMixCalc._renderRows()">';
      h+='<div class="smc-result">'+amt.toFixed(1)+' gal</div></div>';
    });
    document.getElementById('smcBase').innerHTML=h;
    h='';
    this._curAer.forEach((a,i)=>{
      const amt=totalParts>0?(a.ratio/totalParts)*galVol:0;
      h+='<div class="smc-row"><div><div class="smc-name">'+U.esc(a.name)+'</div><div class="smc-desc">'+U.esc(a.desc)+'</div></div>';
      h+='<input class="smc-input" type="number" step="0.01" min="0" value="'+a.ratio.toFixed(2)+'" onchange="SoilMixCalc._curAer['+i+'].ratio=parseFloat(this.value)||0;SoilMixCalc._renderRows()">';
      h+='<div class="smc-result">'+amt.toFixed(1)+' gal</div></div>';
    });
    document.getElementById('smcAer').innerHTML=h;
    h='';
    this._curAmend.forEach((a,i)=>{
      const cups=a.amt*galVol;
      h+='<div class="smc-row"><div><div class="smc-name">'+U.esc(a.name)+'</div><div class="smc-desc">'+U.esc(a.desc)+'</div></div>';
      h+='<input class="smc-input" type="number" step="0.01" min="0" value="'+a.amt.toFixed(3)+'" onchange="SoilMixCalc._curAmend['+i+'].amt=parseFloat(this.value)||0;SoilMixCalc._renderRows()">';
      h+='<div class="smc-result">'+(cups>=1?cups.toFixed(1)+' cups':(cups*16).toFixed(1)+' tbsp')+'</div></div>';
    });
    document.getElementById('smcAmend').innerHTML=h;
  },
  _saveRecipe(){
    const name=prompt('Recipe name:');if(!name)return;
    const id=U.id('smr');
    const components=[];
    this._curBase.forEach(b=>{if(b.ratio>0)components.push({cat:'base',name:b.name,ratio:b.ratio})});
    this._curAer.forEach(a=>{if(a.ratio>0)components.push({cat:'aeration',name:a.name,ratio:a.ratio})});
    this._curAmend.forEach(a=>{if(a.amt>0)components.push({cat:'amendment',name:a.name,amt:a.amt})});
    Store.set('soilMixRecipes',id,{id,name,totalVolume:this._volume,unit:this._unit,components,createdAt:Date.now()});
    Store.notify();Toast.show('Recipe "'+name+'" saved');
  },
  _loadSaved(id){
    const s=Store.getById('soilMixRecipes',id);if(!s)return;
    this._curBase.forEach(b=>{b.ratio=0});this._curAer.forEach(a=>{a.ratio=0});this._curAmend.forEach(a=>{a.amt=0});
    s.components.forEach(c=>{
      if(c.cat==='base'){const f=this._curBase.find(b=>b.name===c.name);if(f)f.ratio=c.ratio}
      if(c.cat==='aeration'){const f=this._curAer.find(a=>a.name===c.name);if(f)f.ratio=c.ratio}
      if(c.cat==='amendment'){const f=this._curAmend.find(a=>a.name===c.name);if(f)f.amt=c.amt}
    });
    this._volume=s.totalVolume||5;this._unit=s.unit||'gal';
    this._openCalc('custom');
    setTimeout(()=>{
      const vol=document.getElementById('smcVol');if(vol)vol.value=this._volume;
      const unit=document.getElementById('smcUnit');if(unit)unit.value=this._unit;
      this._renderRows();
    },200);
  }
};

const PlantCompare={
  open(preId){
    const plants=Store.mothersArray();
    if(plants.length<2){Toast.show('Need at least 2 plants to compare','error');return}
    let h='<p style="font-size:.78rem;color:var(--text-secondary);margin-bottom:var(--space-md)">Select 2-3 plants to compare side-by-side:</p>';

      h+='<span style="font-size:.68rem;color:var(--text-tertiary);margin-left:auto">'+U.esc(p.growthStage||'—')+'</span></label>';
    });
    h+='</div>';
    Modal.open('&#128200; Compare Plants',h,'<button class="btn btn-primary" onclick="PlantCompare._compare()">Compare</button><button class="btn btn-outline" onclick="Modal.close()">Cancel</button>');
  },
  _compare(){
    const checks=document.querySelectorAll('.pc-check:checked');
    const ids=Array.from(checks).map(c=>c.value);
    if(ids.length<2||ids.length>3){Toast.show('Select 2 or 3 plants','error');return}
    const stats=ids.map(id=>this._gatherStats(id)).filter(Boolean);
    if(stats.length<2) return;
    this._renderComparison(stats);
  },
  _gatherStats(mid){
    const m=Store.getById('mothers',mid);if(!m) return null;
    const env=m.environmentId?Store.getById('environments',m.environmentId):null;
    const feeds=Store.feedingsForMother(mid);
    const ipm=Store.ipmForMother(mid);
    const harvests=Store.harvestsForMother(mid);
    const hc=Store.healthChecksForMother(mid);
    const rate=Store.cloneSuccessRate(mid);
    const yield_=harvests.reduce((s,h)=>s+(parseFloat(h.dryWeight)||0),0);
    const avgH=hc.length?(hc.reduce((s,h)=>s+h.score,0)/hc.length).toFixed(1):null;
    return{id:mid,strainName:m.strainName,strainType:m.strainType||'—',age:U.age(m.dateAcquired),stage:m.growthStage||'—',health:m.healthStatus||'—',env:env?env.name:'—',feedings:feeds.length,ipmIssues:ipm.length,cloneRate:rate!==null?rate+'%':'N/A',yield:yield_>0?yield_.toFixed(1)+'g':'N/A',avgHealth:avgH||'N/A',yieldNum:yield_,feedNum:feeds.length,healthNum:avgH?parseFloat(avgH):0};
  },
  _renderComparison(stats){
    const rows=[
      {label:'Strain',key:'strainName'},{label:'Type',key:'strainType'},{label:'Age',key:'age'},
      {label:'Stage',key:'stage'},{label:'Health',key:'health'},{label:'Environment',key:'env'},
      {label:'Feedings',key:'feedings',num:'feedNum'},{label:'IPM Issues',key:'ipmIssues'},
      {label:'Clone Rate',key:'cloneRate'},{label:'Total Yield',key:'yield',num:'yieldNum'},
      {label:'Avg Health Score',key:'avgHealth',num:'healthNum'}
    ];
    let h='<div style="overflow-x:auto"><table class="pc-table"><thead><tr><th>Metric</th>';
    stats.forEach(s=>{h+='<th>'+U.esc(s.strainName)+'</th>'});
    h+='</tr></thead><tbody>';
    rows.forEach(r=>{
      h+='<tr><td style="color:var(--text-tertiary);font-weight:600">'+r.label+'</td>';
      let best=-Infinity,bestIdx=-1;
      if(r.num){stats.forEach((s,i)=>{const v=s[r.num];if(typeof v==='number'&&v>best){best=v;bestIdx=i}})}
      stats.forEach((s,i)=>{
        const cls=r.num&&i===bestIdx&&best>0?' class="pc-best"':'';
        h+='<td'+cls+'>'+U.esc(String(s[r.key]))+'</td>';
      });
      h+='</tr>';
    });
    h+='</tbody></table></div>';
    const barMetrics=[{label:'Feedings',key:'feedNum'},{label:'Yield (g)',key:'yieldNum'},{label:'Health',key:'healthNum'}];
    h+='<div style="margin-top:var(--space-lg)">';
    barMetrics.forEach(bm=>{
      const data=stats.map((s,i)=>({label:s.strainName.slice(0,10),value:s[bm.key]||0,color:Chart._c(i)}));
      if(data.some(d=>d.value>0)){
        h+='<div style="margin-bottom:var(--space-md)"><div style="font-size:.72rem;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;margin-bottom:var(--space-xs)">'+bm.label+'</div>';
        h+=Chart.bar(data,{width:400,height:120});
        h+='</div>';
      }
    });
    h+='</div>';
    Modal.open('&#128200; Plant Comparison',h,'<button class="btn btn-outline" onclick="PlantCompare.open()">&#8592; Back</button><button class="btn btn-outline" onclick="Modal.close()">Close</button>');
  }
};

  /* ── Open Pest ID Tool (standalone) ── */
  open(){

  /* ── Photo handler ── */
  _onPhoto(input){

        }else{
          wrap.innerHTML+='<div class="pid-actions"><button class="btn btn-primary btn-sm" onclick="PestID._openLens()">&#128269; Open in Google Lens</button><button class="btn btn-outline btn-sm" onclick="PestID.openGuide()">&#128214; Visual Pest Guide</button></div>';

  /* ── Google Cloud Vision API ── */
  _analyzeVision(){
    var apiKey=Store.setting('visionApiKey');
    if(!apiKey){Toast.show('No Vision API key configured','error');return}
    if(!this._photoData){Toast.show('Take or upload a photo first','error');return}
    var resultWrap=document.getElementById('pidResultWrap');
    if(resultWrap) resultWrap.innerHTML='<div class="pid-analyzing"><span class="spinner"></span>Analyzing image with Google Cloud Vision\u2026</div>';
    var base64=this._photoData.split(',')[1];
    var payload={requests:[{image:{content:base64},features:[{type:'LABEL_DETECTION',maxResults:20},{type:'WEB_DETECTION',maxResults:10}]}]};
    var self=this;
    fetch('https://vision.googleapis.com/v1/images:annotate?key='+apiKey,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)
    }).then(function(r){return r.json()}).then(function(data){
      if(data.error){
        if(resultWrap) resultWrap.innerHTML='<div class="pid-result" style="border-color:rgba(224,92,58,.3);background:rgba(224,92,58,.06)"><div class="pid-result-label">Error</div><div style="color:#e05c3a;font-size:.85rem">'+U.esc(data.error.message)+'</div></div>';
        return;
      }
      var resp=data.responses&&data.responses[0];
      if(!resp){if(resultWrap) resultWrap.innerHTML='<div class="pid-result"><div class="pid-result-label">No results</div></div>';return}
      var labels=(resp.labelAnnotations||[]).map(function(a){return{name:a.description.toLowerCase(),score:a.score}});
      var webLabels=(resp.webDetection&&resp.webDetection.webEntities||[]).map(function(e){return{name:(e.description||'').toLowerCase(),score:e.score}});
      var allLabels=labels.concat(webLabels);
      var match=self._matchPest(allLabels);
      self._showResult(match,allLabels,resultWrap);
    }).catch(function(err){
      if(resultWrap) resultWrap.innerHTML='<div class="pid-result" style="border-color:rgba(224,92,58,.3);background:rgba(224,92,58,.06)"><div class="pid-result-label">Network Error</div><div style="color:#e05c3a;font-size:.85rem">'+U.esc(err.message||'Could not reach Vision API')+'</div></div>';
    });
  },

  /* ── Match Vision labels to known pests ── */
  _matchPest(allLabels){
    var bestPest=null,bestScore=0;
    var self=this;
    this._pests.forEach(function(pest){
      var keywords=self._visionLabelsMap[pest]||[];
      var score=0;
      allLabels.forEach(function(lbl){
        keywords.forEach(function(kw){
          if(lbl.name.indexOf(kw)!==-1){
            score+=lbl.score||0.5;
          }
        });
      });
      if(score>bestScore){bestScore=score;bestPest=pest}
    });
    return bestPest&&bestScore>0.3?{pest:bestPest,confidence:Math.min(bestScore/2,0.99)}:null;
  },

  /* ── Show analysis result ── */
  _showResult(match,allLabels,wrap){
    if(!wrap) return;
    var h='';
    if(match){
      var guide=this._guide[match.pest];
      var pct=Math.round(match.confidence*100);
      h+='<div class="pid-result"><div class="pid-result-label">Identified</div>';
      h+='<div><span class="pid-result-match">'+(guide?guide.emoji+' ':'')+match.pest.charAt(0).toUpperCase()+match.pest.slice(1)+'</span>';
      h+='<span class="pid-result-conf">'+pct+'% confidence</span></div>';
      if(guide){
        h+='<div class="pid-result-extra"><strong>Signs:</strong> '+U.esc(guide.signs)+'</div>';
        h+='<div class="pid-result-extra" style="color:var(--leaf)"><strong>Treatment:</strong> '+U.esc(guide.treatments)+'</div>';
      }
      h+='<div style="margin-top:var(--space-sm)">';
      h+='<button class="btn btn-primary btn-sm" onclick="PestID._applyToIpm(\''+match.pest+'\')">&#10004; Log as IPM Issue</button>';
      h+='<button class="btn btn-outline btn-sm" style="margin-left:var(--space-xs)" onclick="PestID._openLens()">&#128269; Verify with Lens</button>';
      h+='</div></div>';
    }else{
      h+='<div class="pid-result"><div class="pid-result-label">No Match</div>';
      h+='<div style="font-size:.85rem;color:var(--text-secondary)">Could not confidently identify a specific pest or disease.</div>';
      h+='<div class="pid-result-extra">Detected labels: '+allLabels.slice(0,8).map(function(l){return l.name}).join(', ')+'</div>';
      h+='<div style="margin-top:var(--space-sm)">';
      h+='<button class="btn btn-outline btn-sm" onclick="PestID._openLens()">&#128269; Try Google Lens</button>';
      h+='<button class="btn btn-outline btn-sm" style="margin-left:var(--space-xs)" onclick="PestID.openGuide()">&#128214; Visual Pest Guide</button>';
      h+='</div></div>';
    }
    wrap.innerHTML=h;
  },

  /* ── Apply identification result to IPM form ── */
  _applyToIpm(pest){
    Modal.close();
    IPM.openAddModal();
    setTimeout(function(){
      var pestSel=document.getElementById('f_pest');
      if(pestSel){pestSel.value=pest;pestSel.dispatchEvent(new Event('change'))}
      var typeSel=document.getElementById('f_issueType');
      if(typeSel){
        if(['powdery mildew','bud rot','root rot'].indexOf(pest)!==-1) typeSel.value='disease';
        else if(['nutrient burn','nutrient deficiency'].indexOf(pest)!==-1) typeSel.value='deficiency';
        else typeSel.value='pest';
      }
      var sevSel=document.getElementById('f_severity');
      if(sevSel&&['bud rot','root rot'].indexOf(pest)!==-1) sevSel.value='high';
      Toast.show('Pre-filled: '+pest.charAt(0).toUpperCase()+pest.slice(1)+' \u2014 review and save');
    },200);
  },

  /* ── Google Lens fallback ── */
  _openLens(){
    if(this._photoData){
      /* Open Lens with a general search — user can upload photo in Lens UI */
      window.open('https://lens.google.com','_blank');
      Toast.show('Upload your photo in Google Lens to identify the pest');

      window.open('https://lens.google.com','_blank');

  /* ── Inline identify for IPM form ── */
  injectIntoIpmForm(){
    var apiKey=Store.setting('visionApiKey');
    var h='<div style="margin-bottom:var(--space-md);padding:var(--space-sm);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-sm);background:rgba(0,200,192,.03)">';
    h+='<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--cyan);margin-bottom:var(--space-xs)">\ud83d\udd0d Pest Identification</div>';

      h+='<button class="btn btn-outline btn-sm" id="pidIpmAnalyze" onclick="PestID._analyzeForIpm()" disabled>&#129302; Auto-ID</button>';

  /* ── Photo handler for IPM inline ── */
  _onIpmPhoto(input){

    U.resizeImage(input.files[0],800,0.7,function(dataUrl){

      var prev=document.getElementById('pidIpmPreview');

      if(btn) btn.disabled=false;

  /* ── Analyze from within IPM form ── */
  _analyzeForIpm(){
    var apiKey=Store.setting('visionApiKey');
    if(!apiKey){Toast.show('No Vision API key \u2014 add one in Pest ID Settings','error');return}
    if(!this._photoData){Toast.show('Take a photo first','error');return}
    var resultWrap=document.getElementById('pidIpmResult');
    if(resultWrap) resultWrap.innerHTML='<div class="pid-analyzing"><span class="spinner"></span>Analyzing\u2026</div>';
    var base64=this._photoData.split(',')[1];
    var payload={requests:[{image:{content:base64},features:[{type:'LABEL_DETECTION',maxResults:20},{type:'WEB_DETECTION',maxResults:10}]}]};
    var self=this;
    fetch('https://vision.googleapis.com/v1/images:annotate?key='+apiKey,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)
    }).then(function(r){return r.json()}).then(function(data){
      if(data.error){
        if(resultWrap) resultWrap.innerHTML='<div style="font-size:.8rem;color:#e05c3a">Error: '+U.esc(data.error.message)+'</div>';
        return;
      }
      var resp=data.responses&&data.responses[0];
      if(!resp){if(resultWrap) resultWrap.innerHTML='<div style="font-size:.8rem;color:var(--text-tertiary)">No results</div>';return}
      var labels=(resp.labelAnnotations||[]).map(function(a){return{name:a.description.toLowerCase(),score:a.score}});
      var webLabels=(resp.webDetection&&resp.webDetection.webEntities||[]).map(function(e){return{name:(e.description||'').toLowerCase(),score:e.score}});
      var match=self._matchPest(labels.concat(webLabels));
      if(match){
        var guide=self._guide[match.pest];
        var pct=Math.round(match.confidence*100);
        var rh='<div style="font-size:.82rem;padding:var(--space-xs) var(--space-sm);background:rgba(0,200,192,.08);border-radius:var(--radius-sm);margin-top:var(--space-xs)">';
        rh+='<strong style="color:var(--cyan)">'+(guide?guide.emoji+' ':'')+match.pest.charAt(0).toUpperCase()+match.pest.slice(1)+'</strong>';
        rh+='<span style="color:var(--leaf);margin-left:var(--space-sm);font-size:.75rem">'+pct+'%</span>';
        rh+='<button class="btn btn-outline btn-sm" style="float:right;margin-top:-2px" onclick="PestID._applyInline(\''+match.pest+'\')">Apply</button>';
        rh+='</div>';
        if(resultWrap) resultWrap.innerHTML=rh;
      }else{
        if(resultWrap) resultWrap.innerHTML='<div style="font-size:.78rem;color:var(--text-tertiary);margin-top:var(--space-xs)">No confident match \u2014 try Google Lens or the Visual Pest Guide.</div>';
      }
    }).catch(function(err){
      if(resultWrap) resultWrap.innerHTML='<div style="font-size:.8rem;color:#e05c3a">'+U.esc(err.message||'Network error')+'</div>';
    });
  },

  /* ── Apply inline result to current form fields ── */
  _applyInline(pest){
    var pestSel=document.getElementById('f_pest');
    if(pestSel){pestSel.value=pest}
    var typeSel=document.getElementById('f_issueType');
    if(typeSel){
      if(['powdery mildew','bud rot','root rot'].indexOf(pest)!==-1) typeSel.value='disease';
      else if(['nutrient burn','nutrient deficiency'].indexOf(pest)!==-1) typeSel.value='deficiency';
      else typeSel.value='pest';
    }
    var sevSel=document.getElementById('f_severity');
    if(sevSel&&['bud rot','root rot'].indexOf(pest)!==-1) sevSel.value='high';
    Toast.show('Applied: '+pest.charAt(0).toUpperCase()+pest.slice(1));
  },

  /* ── Visual Pest Guide ── */
  openGuide(){

  /* ── Settings (Vision API Key) ── */
  openSettings(){

    h+='<div style="margin-top:var(--space-md)"><button class="btn btn-outline btn-sm" id="visionTestBtn">&#129302; Test API Key</button> <span id="visionTestResult" style="font-size:.8rem"></span></div>';
    if(!apiKey){
      h+='<div style="margin-top:var(--space-md);padding:var(--space-sm);background:rgba(240,180,41,.08);border:1px solid rgba(240,180,41,.2);border-radius:var(--radius-sm);font-size:.78rem;color:var(--gold)">';
      h+='&#128161; Without an API key you can still use <strong>Google Lens</strong> (manual) and the <strong>Visual Pest Guide</strong> (built-in) for identification.';
      h+='</div>';
    }
    Modal.open('\ud83d\udd0d Pest ID Settings',h,
      '<button class="btn btn-ghost" onclick="Modal.close()">Cancel</button><button class="btn btn-primary" id="visionSave">Save</button>'
    );
    document.getElementById('visionSave').addEventListener('click',function(){
      Store.setting('visionApiKey',document.getElementById('f_visionKey').value.trim());

    document.getElementById('visionTestBtn').addEventListener('click',function(){
      var el=document.getElementById('visionTestResult');

      if(!key){el.textContent='\u2717 No key entered';el.style.color='#e05c3a';return}
      el.textContent='Testing\u2026';el.style.color='var(--text-secondary)';
      /* Send a tiny 1x1 white pixel to test auth */
      var testB64='iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==';
      fetch('https://vision.googleapis.com/v1/images:annotate?key='+key,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({requests:[{image:{content:testB64},features:[{type:'LABEL_DETECTION',maxResults:1}]}]})
      }).then(function(r){return r.json()}).then(function(data){
        if(data.error){el.textContent='\u2717 '+data.error.message;el.style.color='#e05c3a'}
        else{el.textContent='\u2713 API key is valid!';el.style.color='var(--leaf)'}
      }).catch(function(){el.textContent='\u2717 Network error';el.style.color='#e05c3a'});
    });
  }
};

/* ═══════════════════════════════════════════════
   VPD CALCULATOR
   ═══════════════════════════════════════════════ */
const VPDCalc={
  _fToC(f){return(f-32)*5/9},
  _svp(tc){return 0.6108*Math.exp(17.27*tc/(tc+237.3))},
  _zones:[
    {name:'Seedling / Clone',min:0.4,max:0.8,color:'var(--cyan)'},
    {name:'Vegetative',min:0.8,max:1.2,color:'var(--leaf)'},
    {name:'Late Veg / Early Flower',min:1.0,max:1.5,color:'var(--gold)'},
    {name:'Late Flower',min:1.2,max:1.6,color:'var(--orange)'}
  ],
  calculate(tempF,humidity,leafOffsetF){
    var airC=this._fToC(tempF);
    var leafC=this._fToC(tempF+(leafOffsetF||(-2)));
    var svpLeaf=this._svp(leafC);
    var svpAir=this._svp(airC);
    var vpd=svpLeaf-(humidity/100)*svpAir;
    return Math.round(vpd*100)/100;
  },
  _zoneName(vpd){
    if(vpd<0.4) return{label:'Too Low — increase temp or lower humidity',cls:'vpd-low'};
    if(vpd<=0.8) return{label:'Seedling / Clone Zone',cls:'vpd-low'};
    if(vpd<=1.2) return{label:'Vegetative Zone',cls:'vpd-optimal'};
    if(vpd<=1.6) return{label:'Flower Zone',cls:'vpd-optimal'};
    return{label:'Too High — lower temp or raise humidity',cls:'vpd-high'};
  },
  open(envId){
    var temp=75,hum=55,offset=-2;
    if(envId){
      var logs=Store.envArray().filter(function(l){return l.environmentId===envId});
      if(logs.length){var latest=logs[0];if(latest.temperature)temp=latest.temperature;if(latest.humidity)hum=latest.humidity}
    }else{
      var all=Store.envArray();if(all.length){var l=all[0];if(l.temperature)temp=l.temperature;if(l.humidity)hum=l.humidity}
    }
    var self=this;
    var h='<div class="form-row"><div class="form-group"><label class="form-label">Temperature (&deg;F)</label>';
    h+='<input class="form-input" type="number" id="f_vpdTemp" value="'+temp+'" step="0.1"></div>';
    h+='<div class="form-group"><label class="form-label">Humidity (%)</label>';
    h+='<input class="form-input" type="number" id="f_vpdHum" value="'+hum+'" step="0.1"></div>';
    h+='<div class="form-group"><label class="form-label">Leaf Offset (&deg;F)</label>';
    h+='<input class="form-input" type="number" id="f_vpdOff" value="'+offset+'" step="0.5"></div></div>';
    h+='<div id="vpdResult"></div>';
    h+='<div class="vpd-ranges" id="vpdRanges"></div>';
    Modal.open('&#127790; VPD Calculator',h,'<button class="btn btn-ghost" onclick="Modal.close()">Close</button>');
    function calc(){
      var t=parseFloat(document.getElementById('f_vpdTemp').value)||75;
      var hu=parseFloat(document.getElementById('f_vpdHum').value)||50;
      var off=parseFloat(document.getElementById('f_vpdOff').value)||-2;
      var vpd=self.calculate(t,hu,off);
      var zone=self._zoneName(vpd);
      document.getElementById('vpdResult').innerHTML='<div class="vpd-zone '+zone.cls+'">'+vpd.toFixed(2)+' kPa</div><div style="text-align:center;font-size:.82rem;margin-top:var(--space-xs);color:var(--text-secondary)">'+zone.label+'</div>';
      var rh='';self._zones.forEach(function(z){
        var active=vpd>=z.min&&vpd<=z.max;
        rh+='<div'+(active?' class="active-range"':'')+'><span>'+z.name+'</span><span>'+z.min+' – '+z.max+' kPa</span></div>';
      });
      document.getElementById('vpdRanges').innerHTML=rh;
    }
    calc();
    ['f_vpdTemp','f_vpdHum','f_vpdOff'].forEach(function(id){document.getElementById(id).addEventListener('input',calc)});
  },
  _vpdTrendCard(cutoff,envFilter){
    var logs=Store.envArray().filter(function(l){return l.temperature&&l.humidity});
    if(envFilter&&envFilter!=='all') logs=logs.filter(function(l){return l.environmentId===envFilter});
    if(cutoff) logs=logs.filter(function(l){return new Date(l.timestamp)>=cutoff});
    if(logs.length<2) return '';
    logs.sort(function(a,b){return a.timestamp-b.timestamp});
    var self=this;
    var ds=[{label:'VPD (kPa)',color:'var(--cyan)',values:logs.map(function(l){var r=self.calculate(l.temperature,l.humidity,-2);return{x:l.timestamp,y:r?r.vpd:0}})}];
    var labels=logs.map(function(l){return new Date(l.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric'})});
    var h='<div class="card chart-card" style="padding:var(--space-md)"><div class="chart-title">&#127790; VPD Trends</div>';
    h+=Chart.line(ds,{width:540,height:200,xLabels:labels,showDots:logs.length<=20,yMin:0,yMax:2.0});
    h+='<div style="font-size:.65rem;color:var(--text-tertiary);margin-top:var(--space-xs)">Optimal veg: 0.8–1.2 kPa &bull; Flower: 1.0–1.6 kPa</div></div>';
    return h;
  }
};
window.VPDCalc=VPDCalc;

/* ═══════════════════════════════════════════════
   TRICHOME HARVEST TRACKER
   ═══════════════════════════════════════════════ */
const TrichomeTracker={
  openForMother(mid){
    var m=Store.getById('mothers',mid);if(!m)return;
    var readings=Store.trichomeForMother(mid);
    var h='<p style="font-size:.82rem;color:var(--text-secondary);margin-bottom:var(--space-md)">Log trichome development for <strong>'+U.esc(m.strainName)+'</strong> to track harvest readiness.</p>';
    h+='<div style="margin-bottom:var(--space-md);padding:var(--space-md);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-sm)">';
    h+='<div class="form-row"><div class="form-group"><label class="form-label">Clear %</label><input class="form-input" type="number" id="f_triClear" value="70" min="0" max="100"></div>';
    h+='<div class="form-group"><label class="form-label">Cloudy %</label><input class="form-input" type="number" id="f_triCloudy" value="25" min="0" max="100"></div>';
    h+='<div class="form-group"><label class="form-label">Amber %</label><input class="form-input" type="number" id="f_triAmber" value="5" min="0" max="100"></div></div>';
    h+='<div id="triPreviewBar"></div><div id="triRec"></div>';
    h+='<div class="form-group" style="margin-top:var(--space-sm)"><label class="form-label">Notes</label><textarea class="form-textarea" id="f_triNotes" rows="2"></textarea></div>';
    h+='<button class="btn btn-primary btn-sm" onclick="TrichomeTracker._save(\''+mid+'\')">Save Reading</button></div>';
    if(readings.length){
      h+='<div class="section-title">History</div>';
      readings.forEach(function(r){
        h+='<div style="display:flex;align-items:center;gap:var(--space-sm);padding:var(--space-xs) 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.78rem">';
        h+='<span style="min-width:70px;color:var(--text-tertiary)">'+U.relTime(r.timestamp)+'</span>';
        h+='<div class="tri-bar" style="flex:1;height:16px">';
        h+='<div class="tri-bar-seg tri-clear" style="width:'+r.clearPct+'%">'+r.clearPct+'</div>';
        h+='<div class="tri-bar-seg tri-cloudy" style="width:'+r.cloudyPct+'%">'+r.cloudyPct+'</div>';
        h+='<div class="tri-bar-seg tri-amber" style="width:'+r.amberPct+'%">'+r.amberPct+'</div>';
        h+='</div>';
        h+='<span style="min-width:60px;font-size:.7rem">'+TrichomeTracker._recText(r.clearPct,r.cloudyPct,r.amberPct)+'</span>';
        h+='<button class="btn btn-ghost btn-sm" onclick="Store.remove(\'trichomeReadings\',\''+r.id+'\');TrichomeTracker.openForMother(\''+mid+'\')">&#10005;</button>';
        h+='</div>';
      });
    }
    Modal.open('&#128300; Trichome Tracker',h,'<button class="btn btn-ghost" onclick="Modal.close()">Close</button>');
    this._updatePreview();
    ['f_triClear','f_triCloudy','f_triAmber'].forEach(function(id){document.getElementById(id).addEventListener('input',function(){TrichomeTracker._updatePreview()})});
  },
  _updatePreview(){
    var c=parseInt(document.getElementById('f_triClear').value)||0;
    var cl=parseInt(document.getElementById('f_triCloudy').value)||0;
    var a=parseInt(document.getElementById('f_triAmber').value)||0;
    var total=c+cl+a;
    var bar=document.getElementById('triPreviewBar');
    if(bar&&total>0){
      var cp=Math.round(c/total*100),clp=Math.round(cl/total*100),ap=100-cp-clp;
      bar.innerHTML='<div class="tri-bar"><div class="tri-bar-seg tri-clear" style="width:'+cp+'%">'+c+'%</div><div class="tri-bar-seg tri-cloudy" style="width:'+clp+'%">'+cl+'%</div><div class="tri-bar-seg tri-amber" style="width:'+ap+'%">'+a+'%</div></div>';
    }
    var rec=document.getElementById('triRec');
    if(rec) rec.innerHTML='<div class="tri-rec" style="background:rgba(74,158,82,.08);color:var(--leaf)">'+this._recText(c,cl,a)+'</div>';
  },
  _recText(clear,cloudy,amber){
    if(clear>50) return 'Too early';
    if(cloudy>=50&&amber<20) return 'Peak THC';
    if(amber>=20&&amber<40) return 'Balanced';
    if(amber>=40) return 'Heavy sedative';
    return 'Developing';
  },
  _save(mid){
    var c=parseInt(document.getElementById('f_triClear').value)||0;

const DeficiencyWizard={
  _step:0,_answers:[],
  _tree:{

    options:[
      {label:'Older / Lower Leaves',value:'old',next:{
        question:'What do the symptoms look like?',
        options:[
          {label:'Yellowing (chlorosis)',value:'yellow',next:{
            question:'What pattern?',
            options:[

              {label:'Interveinal (veins stay green)',value:'interveinal',result:{name:'Magnesium (Mg) Deficiency',icon:'&#129683;',desc:'Interveinal chlorosis on older leaves — veins remain green while areas between yellow. Common in acidic soil or high-K feeds.',fix:'Foliar spray with Epsom salt (1 tsp/gal). Add CalMag supplement. Check pH — Mg locks out below 6.0. Reduce excess potassium.'}},
              {label:'Edges / margins',value:'edges',result:{name:'Potassium (K) Deficiency',icon:'&#127810;',desc:'Yellowing and browning of leaf edges on older leaves. Tips may curl. Reduces bud density in flower.',fix:'Increase potassium: kelp meal, potash, or bloom nutrients. Flush if salt buildup suspected. Check pH (6.0–7.0).'}}

          }},
          {label:'Browning / necrosis',value:'brown',next:{
            question:'Where is the browning?',
            options:[
              {label:'Leaf edges and margins',value:'edges',result:{name:'Potassium (K) Deficiency',icon:'&#127810;',desc:'Brown, crispy leaf edges progressing inward on older leaves. Often mistaken for nutrient burn but starts at margins, not tips.',fix:'Add potassium: kelp meal, langbeinite, or bloom-phase nutrients. Flush with pH-balanced water first if EC is high.'}},
              {label:'Leaf tips (crispy)',value:'tips',result:{name:'Nutrient Burn (Excess)',icon:'&#128293;',desc:'Brown, crispy tips progressing inward. Dark green leaves. Caused by over-feeding.',fix:'Flush medium with 3× pot volume of pH-balanced water. Reduce nutrient strength by 25–50%. Let medium dry before resuming at lower dose.'}},
              {label:'Rust spots',value:'spots',result:{name:'Calcium (Ca) Deficiency',icon:'&#129704;',desc:'Brown/rust spots on older leaves. Irregular necrotic patches. Stunted new growth with crinkled leaves.',fix:'Add CalMag supplement. Check pH (Ca locks out below 6.2 in soil). Ensure adequate watering — Ca moves with water flow.'}}
            ]
          }},
          {label:'Purple / red stems',value:'purple',result:{name:'Phosphorus (P) Deficiency',icon:'&#128156;',desc:'Purple/red stems and petioles. Dark green leaves that may curl down. Slow growth. Common in cold temperatures.',fix:'Increase phosphorus: bone meal, bat guano, or bloom nutrients. Raise root zone temp above 65°F. Check pH (6.2–7.0).'}}
        ]
      }},
      {label:'Newer / Upper Leaves',value:'new',next:{
        question:'What do the symptoms look like?',
        options:[
          {label:'Yellowing (chlorosis)',value:'yellow',next:{
            question:'What pattern?',
            options:[
              {label:'Interveinal (veins stay green)',value:'interveinal',result:{name:'Iron (Fe) Deficiency',icon:'&#129704;',desc:'Interveinal chlorosis on NEW growth — veins stay bright green while leaf tissue yellows. Iron is immobile.',fix:'Foliar spray with chelated iron. Lower pH — iron locks out above 6.5. Avoid overwatering. Check for excess calcium or manganese.'}},
              {label:'Uniform pale / light green',value:'uniform',result:{name:'Sulfur (S) Deficiency',icon:'&#127793;',desc:'Uniform light green/yellow new growth. Unlike nitrogen, sulfur deficiency hits new leaves first (semi-immobile).',fix:'Add sulfur: gypsum (calcium sulfate), Epsom salt. Most base nutrients contain sufficient S — check pH first.'}},
              {label:'Spots between veins',value:'spots',result:{name:'Manganese (Mn) Deficiency',icon:'&#127808;',desc:'Tan/brown spots in interveinal areas of new leaves. Leaf tissue between veins becomes pale with necrotic spots.',fix:'Foliar spray with manganese sulfate. Lower pH if above 6.5. Often caused by excess iron or high pH lockout.'}}
            ]
          }},
          {label:'Curling / distorted',value:'curl',next:{
            question:'How are leaves curling?',
            options:[
              {label:'Tips curling / hooking',value:'tips',result:{name:'Calcium (Ca) Deficiency',icon:'&#129704;',desc:'New growth tips curl and hook. Crinkled, distorted new leaves. Brown spots may follow. Ca is immobile — can\'t redistribute.',fix:'CalMag supplement (5ml/gal). Check pH (needs 6.2+ in soil). Ensure consistent watering — Ca travels with transpiration flow.'}},
              {label:'Leaves curl under (clawing)',value:'under',result:{name:'Nitrogen Toxicity (Excess N)',icon:'&#128165;',desc:'Dark green leaves curling downward (\"the claw\"). Indicates too much nitrogen. Shiny, waxy leaf surface.',fix:'Flush medium with pH-balanced water. Reduce nitrogen in feed. Switch to bloom ratios if in flower. Allow soil to dry between waterings.'}},
              {label:'Edges curl up',value:'up',result:{name:'Heat / Light Stress',icon:'&#127777;',desc:'Leaf edges curl upward (taco-ing). Often combined with bleaching at tops. Not a nutrient issue — environmental.',fix:'Raise lights, increase distance. Improve airflow. Lower ambient temperature. Check VPD.'}}
            ]
          }},
          {label:'Browning / necrosis',value:'brown',result:{name:'Boron (B) Deficiency',icon:'&#129715;',desc:'New growth dies at tips. Hollow, rough stems. Stunted, thick new growth that may twist. Rare in cannabis.',fix:'Add borax (very small amount — 1/4 tsp per 5 gal). Check pH. Often caused by overwatering or very dry soil.'}}

      }},
      {label:'All Leaves / Whole Plant',value:'all',next:{
        question:'What is the main symptom?',
        options:[
          {label:'Purple / red coloring',value:'purple',result:{name:'Phosphorus (P) Deficiency',icon:'&#128156;',desc:'Purple stems, petioles, and sometimes leaf undersides across the whole plant. Slow growth, small leaves.',fix:'Bone meal, bat guano, or increase bloom nutrients. Ensure root zone temp is above 65°F. Flush then feed with high-P solution.'}},
          {label:'General yellowing everywhere',value:'yellow',result:{name:'Nitrogen (N) Deficiency (Advanced)',icon:'&#127811;',desc:'When N deficiency progresses, it spreads from lower to upper leaves. Whole plant becomes pale green/yellow. Severe = leaf drop.',fix:'Immediate nitrogen feeding: fish emulsion (fast) or blood meal (slower). Foliar spray for quick correction. Check root health — root rot causes similar symptoms.'}},
          {label:'Wilting despite watering',value:'wilt',result:{name:'Root Issues (Root Rot / Overwater)',icon:'&#129713;',desc:'Drooping, wilting, and yellowing even with adequate moisture. Check roots — healthy roots are white, sick roots are brown and slimy.',fix:'Let medium dry out completely. H2O2 root drench (3%, 1:4 with water). Improve drainage. Add beneficial microbes (Mycorrhizae, Trichoderma). Repot in fresh medium if severe.'}},
          {label:'Burnt tips everywhere',value:'burn',result:{name:'Nutrient Burn / Salt Buildup',icon:'&#128293;',desc:'Crispy brown leaf tips across the entire plant. Dark green coloring. Caused by accumulated salts or heavy feeding.',fix:'Heavy flush: 3× pot volume of pH-balanced water. Check runoff EC/PPM — should be <1000 PPM. Resume feeding at 50% strength.'}}
        ]
      }}
    ]
  },
  open(){
    this._step=0;this._answers=[];
    this._renderStep(this._tree);
  },
  _renderStep(node){
    var self=this;
    var h='<div class="dw-step"><div class="dw-question">'+node.question+'</div>';
    node.options.forEach(function(opt){
      h+='<button class="dw-opt" onclick="DeficiencyWizard._onChoice(\''+U.esc(opt.value)+'\')">'+U.esc(opt.label)+'</button>';
    });
    h+='</div>';
    if(this._step>0) h+='<div style="text-align:center;margin-top:var(--space-sm)"><button class="btn btn-ghost btn-sm" onclick="DeficiencyWizard._goBack()">&#8592; Back</button></div>';
    Modal.open('&#129658; Deficiency Wizard',h,'<button class="btn btn-ghost" onclick="Modal.close()">Close</button>');
    this._currentNode=node;
  },
  _onChoice(value){
    this._answers.push(value);this._step++;
    var node=this._currentNode;
    var chosen=node.options.find(function(o){return o.value===value});
    if(!chosen) return;
    if(chosen.result) this._renderResult(chosen.result);
    else if(chosen.next) this._renderStep(chosen.next);
  },
  _goBack(){
    if(this._step<=0) return;
    this._answers.pop();this._step--;
    /* Re-traverse tree to previous node */
    var node=this._tree;
    for(var i=0;i<this._answers.length;i++){
      var chosen=node.options.find(function(o){return o.value===this._answers[i]}.bind(this));
      if(chosen&&chosen.next) node=chosen.next; else break;
    }
    this._renderStep(node);
  },
  _renderResult(result){
    var h='<div class="dw-result"><h3>'+result.icon+' '+result.name+'</h3>';
    h+='<p>'+result.desc+'</p>';
    h+='<p style="color:var(--leaf)"><strong>Fix:</strong> '+result.fix+'</p></div>';
    h+='<div style="margin-top:var(--space-md);text-align:center">';
    var pestType=result.name.indexOf('Burn')!==-1||result.name.indexOf('Toxicity')!==-1||result.name.indexOf('Excess')!==-1?'nutrient burn':'nutrient deficiency';
    h+='<button class="btn btn-primary btn-sm" onclick="DeficiencyWizard._logAsIpm(\''+pestType+'\')">&#10004; Log as IPM Issue</button>';
    h+=' <button class="btn btn-outline btn-sm" onclick="DeficiencyWizard.open()">&#8634; Start Over</button>';
    h+='</div>';
    Modal.open('&#129658; Diagnosis',h,'<button class="btn btn-ghost" onclick="Modal.close()">Close</button>');
  },
  _logAsIpm(pestType){
    Modal.close();
    IPM.openAddModal();
    setTimeout(function(){
      var pest=document.getElementById('f_pest');if(pest)pest.value=pestType;
      var typ=document.getElementById('f_issueType');if(typ)typ.value='deficiency';
      Toast.show('Pre-filled: '+pestType.charAt(0).toUpperCase()+pestType.slice(1)+' — review and save');
    },200);
  }
};
window.DeficiencyWizard=DeficiencyWizard;

/* ═══════════════════════════════════════════════
   DLI CALCULATOR
   ═══════════════════════════════════════════════ */
const DLICalc={
  _lights:{LED:{factor:2.0,label:'LED'},HPS:{factor:1.7,label:'HPS'},CMH:{factor:1.8,label:'CMH/LEC'},Fluorescent:{factor:0.9,label:'Fluorescent'},Sunlight:{ppfd:900,label:'Sunlight (direct)'}},
  _stages:[{name:'Seedling',min:12,max:18,color:'var(--cyan)'},{name:'Vegetative',min:18,max:30,color:'var(--leaf)'},{name:'Flower',min:30,max:45,color:'var(--gold)'}],
  open(){
    var h='<div class="form-row"><div class="form-group"><label class="form-label">Light Type</label><select class="form-select" id="f_dliType">';
    var self=this;
    Object.keys(this._lights).forEach(function(k){h+='<option value="'+k+'">'+self._lights[k].label+'</option>'});
    h+='</select></div><div class="form-group"><label class="form-label">Wattage</label><input class="form-input" type="number" id="f_dliWatt" value="600"></div></div>';
    h+='<div class="form-row"><div class="form-group"><label class="form-label">PPFD (&mu;mol/m&sup2;/s)</label><input class="form-input" type="number" id="f_dliPpfd" value="1200" step="1"><div class="form-hint">Auto-estimated from type &amp; wattage, or enter your measured value</div></div>';
    h+='<div class="form-group"><label class="form-label">Photoperiod (hours)</label><input class="form-input" type="number" id="f_dliHours" value="18" min="1" max="24" step="0.5"></div></div>';
    h+='<div id="dliResult"></div>';
    Modal.open('&#9728; DLI Calculator',h,'<button class="btn btn-ghost" onclick="Modal.close()">Close</button>');
    function updatePpfd(){
      var type=document.getElementById('f_dliType').value;
      var watt=parseFloat(document.getElementById('f_dliWatt').value)||0;
      var light=self._lights[type];
      if(light.ppfd){document.getElementById('f_dliPpfd').value=light.ppfd;document.getElementById('f_dliWatt').disabled=true}
      else{document.getElementById('f_dliWatt').disabled=false;document.getElementById('f_dliPpfd').value=Math.round(watt*light.factor)}
      calc();
    }
    function calc(){
      var ppfd=parseFloat(document.getElementById('f_dliPpfd').value)||0;
      var hours=parseFloat(document.getElementById('f_dliHours').value)||0;
      var dli=(ppfd*3600*hours)/1000000;
      var rh='<div class="vpd-zone '+(dli<12?'vpd-low':dli<=45?'vpd-optimal':'vpd-high')+'">'+dli.toFixed(1)+' mol/m&sup2;/day</div>';
      rh+='<div class="vpd-ranges">';
      self._stages.forEach(function(s){
        var active=dli>=s.min&&dli<=s.max;
        rh+='<div'+(active?' class="active-range"':'')+'><span>'+s.name+'</span><span>'+s.min+' – '+s.max+' DLI</span></div>';
      });
      rh+='</div>';
      document.getElementById('dliResult').innerHTML=rh;
    }
    document.getElementById('f_dliType').addEventListener('change',updatePpfd);
    document.getElementById('f_dliWatt').addEventListener('input',updatePpfd);
    document.getElementById('f_dliPpfd').addEventListener('input',calc);
    document.getElementById('f_dliHours').addEventListener('input',calc);
    updatePpfd();
  }
};
window.DLICalc=DLICalc;

  openRun(id){

    if(r.notes) h+='<div style="margin-top:var(--space-md);font-size:.82rem;color:var(--text-secondary)">'+U.esc(r.notes)+'</div>';
    var foot='<button class="btn btn-ghost" onclick="RunManager.open()">Back</button>';
    foot+='<button class="btn btn-outline" onclick="RunManager.openForm(\''+id+'\')">Edit</button>';
    if(r.status==='active') foot+='<button class="btn btn-primary" onclick="RunManager._complete(\''+id+'\')">Complete Run</button>';
    Modal.open('&#128230; '+U.esc(r.name),h,foot);
  },
  _aggregateStats(r){
    var totalYield=0,totalCost=0;
    (r.plantIds||[]).forEach(function(pid){
      Store.harvestsForMother(pid).forEach(function(h){totalYield+=(parseFloat(h.dryWeight)||0)});
      Store.expensesForMother(pid).forEach(function(e){totalCost+=(e.amount||0)});
    });
    var days=r.startDate?U.daysBetween(U.parseDate(r.startDate),r.endDate?U.parseDate(r.endDate):new Date()):0;
    return{yield:totalYield,cost:totalCost,days:days};
  },
  _complete(id){
    var r=Store.getById('growRuns',id);if(!r)return;
    r.status='completed';r.endDate=U.today();
    Store.set('growRuns',id,r);
    Store.addActivity('grow_run','Completed grow run: '+r.name);
    Toast.show('Run completed!');RunManager.openRun(id);
  }
};
window.RunManager=RunManager;

/* ═══════════════════════════════════════════════
   PH/EC CALIBRATION LOG
   ═══════════════════════════════════════════════ */
const CalibrationLog={
  _TYPES:['pH','EC','pH/EC Combo','DO','TDS','Other'],
  /* ── Per-meter status helpers ── */
  daysSinceForMeter(meterId){
    var logs=Store.calibrationLogsForMeter(meterId);
    if(!logs.length) return null;
    return U.daysBetween(new Date(logs[0].timestamp),new Date());
  },
  isMeterOverdue(meterId){
    var meter=Store.getById('meters',meterId);if(!meter) return true;
    var days=this.daysSinceForMeter(meterId);
    if(days===null) return true;
    return days>(meter.intervalDays||30);
  },
  /* ── Global fallback (backward compat + no meters) ── */
  daysSinceCalibration(){
    var meters=Store.metersArray();
    if(meters.length){
      var worst=null;
      meters.forEach(function(m){var d=CalibrationLog.daysSinceForMeter(m.id);if(d===null||worst===null||d>worst) worst=d});
      return worst;
    }
    var last=Store.setting('lastCalibrationDate');
    if(!last) return null;
    return U.daysBetween(U.parseDate(last),new Date());
  },
  isOverdue(){
    var meters=Store.metersArray();
    if(meters.length){
      for(var i=0;i<meters.length;i++){if(this.isMeterOverdue(meters[i].id)) return true}
      return false;
    }
    var days=this.daysSinceCalibration();
    if(days===null) return true;
    return days>(Store.setting('calibrationIntervalDays')||30);
  },
  /* ── Badge ── */
  _meterBadge(meterId){
    var days=this.daysSinceForMeter(meterId);
    var overdue=this.isMeterOverdue(meterId);
    var color=overdue?'#e05c3a':'var(--leaf)';
    var text=days===null?'Never calibrated':days+'d since cal';
    return '<span style="font-size:.65rem;padding:2px 6px;border-radius:3px;background:rgba('+(overdue?'224,92,58':'74,158,82')+',.1);color:'+color+'">'+text+'</span>';
  },
  badgeHtml(){
    var meters=Store.metersArray();
    if(meters.length){
      var worst=null,worstDays=-1,worstName='';
      var self=this;
      meters.forEach(function(m){
        var d=self.daysSinceForMeter(m.id);
        var ov=self.isMeterOverdue(m.id);
        if(ov&&(d===null||d>worstDays)){worst=m;worstDays=d===null?9999:d;worstName=m.name}
      });
      if(worst){
        var text=worstDays===9999?U.esc(worstName)+' never cal':U.esc(worstName)+' '+worstDays+'d';
        return '<span style="font-size:.65rem;padding:2px 6px;border-radius:3px;background:rgba(224,92,58,.1);color:#e05c3a">&#9879; '+text+'</span>';
      }
      /* All current — show most recent */
      var best=null,bestDays=9999;
      meters.forEach(function(m){var d=self.daysSinceForMeter(m.id);if(d!==null&&d<bestDays){best=m;bestDays=d}});
      if(best) return '<span style="font-size:.65rem;padding:2px 6px;border-radius:3px;background:rgba(74,158,82,.1);color:var(--leaf)">&#9879; '+bestDays+'d since cal</span>';
    }
    var days=this.daysSinceCalibration();
    var overdue=this.isOverdue();
    var color=overdue?'#e05c3a':'var(--leaf)';
    var text=days===null?'Never calibrated':days+'d since cal';
    return '<span style="font-size:.65rem;padding:2px 6px;border-radius:3px;background:rgba('+(overdue?'224,92,58':'74,158,82')+',.1);color:'+color+'">&#9879; '+text+'</span>';
  },
  /* ── Meter CRUD ── */
  _buildMeterForm(m){
    if(!m) m={};
    var h='<div class="form-group"><label class="form-label">Name *</label>';
    h+='<input class="form-input" id="f_meterName" value="'+U.esc(m.name||'')+'" placeholder="e.g. Bluelab pH Pen"></div>';
    h+='<div class="form-row"><div class="form-group"><label class="form-label">Type</label><select class="form-select" id="f_meterType">';
    this._TYPES.forEach(function(t){h+='<option value="'+t+'"'+(t===(m.type||'pH')?' selected':'')+'>'+t+'</option>'});
    h+='</select></div><div class="form-group"><label class="form-label">Cal Interval (days)</label>';
    h+='<input class="form-input" type="number" id="f_meterInterval" value="'+(m.intervalDays||30)+'" min="1" max="365"></div></div>';
    h+='<div class="form-row"><div class="form-group"><label class="form-label">Model</label>';
    h+='<input class="form-input" id="f_meterModel" value="'+U.esc(m.model||'')+'" placeholder="Optional"></div>';
    h+='<div class="form-group"><label class="form-label">Serial #</label>';
    h+='<input class="form-input" id="f_meterSN" value="'+U.esc(m.serialNumber||'')+'" placeholder="Optional"></div></div>';
    h+='<div class="form-group"><label class="form-label">Notes</label>';
    h+='<input class="form-input" id="f_meterNotes" value="'+U.esc(m.notes||'')+'" placeholder="Optional"></div>';
    return h;

  _readMeterForm(){
    var name=document.getElementById('f_meterName').value.trim();
    if(!name){Toast.show('Meter name is required','error');return null}
    return{name:name,type:document.getElementById('f_meterType').value,
      intervalDays:parseInt(document.getElementById('f_meterInterval').value)||30,

      notes:document.getElementById('f_meterNotes').value.trim()};

  openAddMeter(){
    var h=this._buildMeterForm();

      '<button class="btn btn-ghost" onclick="CalibrationLog.open()">Cancel</button><button class="btn btn-primary" id="saveMeter">Save</button>');
    document.getElementById('saveMeter').addEventListener('click',function(){
      var data=CalibrationLog._readMeterForm();if(!data) return;
      var id=U.id('met');data.id=id;data.archived=false;data.createdAt=Date.now();
      Store.set('meters',id,data);
      Store.addActivity('meter_added','Added meter: '+data.name,id);
      Toast.show('Meter added!');CalibrationLog.open();

  openEditMeter(id){
    var m=Store.getById('meters',id);if(!m) return;
    var h=this._buildMeterForm(m);
    Modal.open('&#9879; Edit Meter',h,
      '<button class="btn btn-ghost" onclick="CalibrationLog.open()">Cancel</button><button class="btn btn-primary" id="saveMeter">Save</button>');
    document.getElementById('saveMeter').addEventListener('click',function(){
      var data=CalibrationLog._readMeterForm();if(!data) return;

      Toast.show('Meter updated!');CalibrationLog.open();

  _archiveMeter(id){
    var m=Store.getById('meters',id);if(!m) return;
    if(!confirm('Archive "'+m.name+'"? Calibration history is kept.')) return;
    m.archived=true;Store.set('meters',id,m);
    Store.addActivity('meter_archived','Archived meter: '+m.name,id);
    Toast.show('Meter archived');this.open();
  },
  /* ── Calibrate a specific meter ── */
  openCalibrate(meterId){
    var meter=Store.getById('meters',meterId);if(!meter) return;
    var h='<p style="font-size:.85rem;margin-bottom:var(--space-md)">Calibrating: <strong>'+U.esc(meter.name)+'</strong> ('+U.esc(meter.type)+')</p>';
    h+='<div class="form-row"><div class="form-group"><label class="form-label">Buffers Used</label>';
    h+='<input class="form-input" id="f_calBuffers" placeholder="e.g. 4.0, 7.0"></div></div>';
    h+='<div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="f_calNotes" placeholder="Optional"></div>';
    Modal.open('&#9879; Log Calibration',h,
      '<button class="btn btn-ghost" onclick="CalibrationLog.open()">Cancel</button><button class="btn btn-primary" id="calSaveBtn">Log Calibration</button>');
    document.getElementById('calSaveBtn').addEventListener('click',function(){
      var id=U.id('cal');
      Store.set('calibrationLogs',id,{id:id,timestamp:Date.now(),meterId:meterId,meterType:meter.type,buffers:document.getElementById('f_calBuffers').value.trim(),notes:document.getElementById('f_calNotes').value.trim()});
      Store.setting('lastCalibrationDate',U.today());
      Store.addActivity('calibration','Calibrated '+meter.name+' ('+meter.type+')');
      Toast.show('Calibration logged!');CalibrationLog.open();
    });
  },
  /* ── Main modal ── */
  open(){
    var meters=Store.metersArray();
    var logs=Store.calibrationLogsArray();
    var self=this;
    var h='';
    /* My Meters section */
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-sm)">';
    h+='<div class="section-title" style="margin-bottom:0">My Meters</div>';
    h+='<button class="btn btn-primary btn-sm" onclick="CalibrationLog.openAddMeter()">+ Add Meter</button></div>';

      meters.forEach(function(m){
        var overdue=self.isMeterOverdue(m.id);
        h+='<div style="padding:var(--space-sm);border:1px solid '+(overdue?'rgba(224,92,58,.3)':'rgba(255,255,255,.06)')+';border-radius:var(--radius-sm);margin-bottom:var(--space-xs);background:'+(overdue?'rgba(224,92,58,.04)':'rgba(255,255,255,.02)')+'">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
        h+='<div><strong style="font-size:.85rem">'+U.esc(m.name)+'</strong> <span style="font-size:.68rem;color:var(--text-tertiary)">'+U.esc(m.type)+'</span>';
        if(m.model) h+=' <span style="font-size:.62rem;color:var(--text-tertiary)">&middot; '+U.esc(m.model)+'</span>';
        h+='</div>';
        h+=self._meterBadge(m.id)+'</div>';
        h+='<div style="display:flex;gap:var(--space-xs);margin-top:4px">';
        h+='<button class="btn btn-primary btn-sm" onclick="CalibrationLog.openCalibrate(\''+m.id+'\')">&#9879; Calibrate</button>';
        h+='<button class="btn btn-ghost btn-sm" onclick="CalibrationLog.openEditMeter(\''+m.id+'\')">Edit</button>';
        h+='<button class="btn btn-ghost btn-sm" style="color:#e05c3a" onclick="CalibrationLog._archiveMeter(\''+m.id+'\')">Archive</button>';
        h+='</div></div>';
      });
    }else{
      h+='<div style="font-size:.78rem;color:var(--text-tertiary);padding:var(--space-md) 0;text-align:center">No meters yet. Add your pH/EC pens to track each one separately.</div>';
    }
    /* Quick Log (for users without meters or quick logging) */
    h+='<div style="padding:var(--space-md);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-sm);margin:var(--space-md) 0">';
    h+='<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;color:var(--cyan);margin-bottom:var(--space-sm)">Quick Log</div>';
    h+='<div class="form-row"><div class="form-group"><label class="form-label">Meter</label><select class="form-select" id="f_calMeter">';
    if(meters.length){
      meters.forEach(function(m){h+='<option value="'+m.id+'">'+U.esc(m.name)+' ('+U.esc(m.type)+')</option>'});
      h+='<option value="">— Unspecified —</option>';
    }else{
      ['pH','EC','Both'].forEach(function(t){h+='<option value="'+t+'">'+t+'</option>'});
    }
    h+='</select></div><div class="form-group"><label class="form-label">Buffers Used</label><input class="form-input" id="f_calBuffers" placeholder="e.g. 4.0, 7.0"></div></div>';
    h+='<div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="f_calNotes" placeholder="Optional"></div>';
    h+='<button class="btn btn-primary btn-sm" onclick="CalibrationLog._save()">Log Calibration</button></div>';
    /* Global interval (only when no meters) */
    if(!meters.length){
      var interval=Store.setting('calibrationIntervalDays')||30;
      h+='<div class="form-row" style="margin-top:var(--space-md)"><div class="form-group"><label class="form-label">Reminder Interval (days)</label>';
      h+='<input class="form-input" type="number" id="f_calInterval" value="'+interval+'" min="1" max="365"></div></div>';
    }
    /* History */
    if(logs.length){
      h+='<div class="section-title" style="margin-top:var(--space-md)">History</div>';
      logs.slice(0,15).forEach(function(l){
        var meterName='';
        if(l.meterId){var mt=Store.getById('meters',l.meterId);if(mt) meterName=mt.name+' — '}
        h+='<div style="display:flex;justify-content:space-between;padding:var(--space-xs) 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.78rem">';
        h+='<span>'+U.relTime(l.timestamp)+' — <strong>'+U.esc(meterName)+U.esc(l.meterType||'')+'</strong>';
        if(l.buffers) h+=' ('+U.esc(l.buffers)+')';
        if(l.notes) h+=' <span style="color:var(--text-tertiary)">'+U.esc(l.notes)+'</span>';

        h+='<button class="btn btn-ghost btn-sm" onclick="Store.remove(\'calibrationLogs\',\''+l.id+'\');CalibrationLog.open()">&#10005;</button></div>';
      });

    var footer='<button class="btn btn-ghost" onclick="Modal.close()">Close</button>';
    if(!meters.length) footer+='<button class="btn btn-primary" id="calSave">Save Interval</button>';
    Modal.open('&#9879; pH/EC Calibration',h,footer);
    if(!meters.length){
      document.getElementById('calSave').addEventListener('click',function(){
        Store.setting('calibrationIntervalDays',parseInt(document.getElementById('f_calInterval').value)||30);
        Toast.show('Calibration interval saved!');Modal.close();
      });

  },
  _save(){
    var meters=Store.metersArray();
    var meterSelect=document.getElementById('f_calMeter').value;
    var id=U.id('cal');
    var entry={id:id,timestamp:Date.now(),buffers:document.getElementById('f_calBuffers').value.trim(),notes:document.getElementById('f_calNotes').value.trim()};
    if(meters.length){
      /* Meter-based: meterSelect is a meter ID or empty */
      if(meterSelect){
        var meter=Store.getById('meters',meterSelect);
        entry.meterId=meterSelect;
        entry.meterType=meter?meter.type:'';
      }else{entry.meterType='Unspecified'}
    }else{
      /* Legacy: meterSelect is pH/EC/Both */
      entry.meterType=meterSelect;
    }
    Store.set('calibrationLogs',id,entry);
    Store.setting('lastCalibrationDate',U.today());
    var label=entry.meterId&&Store.getById('meters',entry.meterId)?Store.getById('meters',entry.meterId).name+' ('+entry.meterType+')':entry.meterType;
    Store.addActivity('calibration','Logged '+label+' calibration');
    Toast.show('Calibration logged!');this.open();
  }
};
window.CalibrationLog=CalibrationLog;

/* ═══════════════════════════════════════════════
   FLEET VIEW (Table Mode)
   ═══════════════════════════════════════════════ */
const FleetView={
  _sortCol:'strainName',_sortDir:'asc',
  _toggleSort(col){
    if(this._sortCol===col) this._sortDir=this._sortDir==='asc'?'desc':'asc';
    else{this._sortCol=col;this._sortDir='asc'}
    Plants.render();
  },
  renderTable(filtered){
    var self=this;
    var cols=[
      {key:'strainName',label:'Strain'},
      {key:'strainType',label:'Type'},
      {key:'growthStage',label:'Stage'},
      {key:'healthStatus',label:'Health'},
      {key:'age',label:'Age'},
      {key:'env',label:'Environ'},
      {key:'lastFed',label:'Last Fed'},
      {key:'ipmDays',label:'IPM'},
      {key:'yield',label:'Yield'}
    ];
    /* Sort */
    var sorted=filtered.slice().sort(function(a,b){
      var av=self._sortVal(a,self._sortCol),bv=self._sortVal(b,self._sortCol);
      if(typeof av==='number'&&typeof bv==='number') return self._sortDir==='asc'?av-bv:bv-av;
      return self._sortDir==='asc'?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));
    });
    var h='<table class="fleet-table"><thead><tr>';
    cols.forEach(function(c){
      var arrow=self._sortCol===c.key?(self._sortDir==='asc'?' &#9650;':' &#9660;'):'';
      h+='<th onclick="FleetView._toggleSort(\''+c.key+'\')">'+c.label+arrow+'</th>';
    });
    h+='</tr></thead><tbody>';
    sorted.forEach(function(m){
      var env=m.environmentId?Store.getById('environments',m.environmentId):null;
      h+='<tr onclick="Plants.openEditModal(\''+m.id+'\')" style="cursor:pointer">';
      h+='<td><strong>'+U.esc(m.strainName)+'</strong></td>';
      h+='<td>'+(m.strainType||'—')+'</td>';
      h+='<td>'+(m.growthStage?m.growthStage.charAt(0).toUpperCase()+m.growthStage.slice(1):'—')+'</td>';
      h+='<td><span class="badge-'+m.healthStatus+'" style="font-size:.65rem;padding:1px 6px;border-radius:3px">'+m.healthStatus+'</span></td>';
      h+='<td>'+U.age(m.dateAcquired)+'</td>';
      h+='<td>'+(env?U.esc(env.name):'—')+'</td>';
      h+='<td>'+self._lastFed(m.id)+'</td>';
      h+='<td>'+self._daysSinceIpm(m.id)+'</td>';
      h+='<td>'+self._yieldForMother(m.id)+'</td>';
      h+='</tr>';
    });
    h+='</tbody></table>';
    return h;
  },
  _sortVal(m,col){
    switch(col){
      case 'strainName':return m.strainName||'';
      case 'strainType':return m.strainType||'';
      case 'growthStage':return m.growthStage||'';
      case 'healthStatus':return m.healthStatus||'';
      case 'age':return m.dateAcquired?U.daysBetween(U.parseDate(m.dateAcquired),new Date()):0;
      case 'env':var e=m.environmentId?Store.getById('environments',m.environmentId):null;return e?e.name:'';
      case 'lastFed':var f=Store.feedingsForMother(m.id);return f.length?f[0].timestamp:0;
      case 'ipmDays':var ip=Store.ipmForMother(m.id);return ip.length?U.daysBetween(new Date(ip[0].timestamp),new Date()):999;
      case 'yield':return Store.harvestsForMother(m.id).reduce(function(s,h){return s+(parseFloat(h.dryWeight)||0)},0);
      default:return '';
    }
  },
  _lastFed(mid){var f=Store.feedingsForMother(mid);return f.length?U.relTime(f[0].timestamp):'\u2014'},
  _daysSinceIpm(mid){var l=Store.ipmForMother(mid);if(!l.length)return '\u2014';return U.daysBetween(new Date(l[0].timestamp),new Date())+'d'},
  _yieldForMother(mid){var y=Store.harvestsForMother(mid).reduce(function(s,h){return s+(parseFloat(h.dryWeight)||0)},0);return y?y.toFixed(0)+'g':'\u2014'}
};
window.FleetView=FleetView;

/* ═══════════════════════════════════════════════
   GROW ROOM DIAGRAM
